<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRINDLAB — Skatepark Editor</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#0a0a0c;--panel:#111114;--panel2:#18181c;--panel3:#1e1e24;
--border:rgba(255,255,255,.06);--border2:rgba(255,255,255,.1);
--text:#f0f0f4;--text2:#c8c8d0;--dim:#6a6a7a;--dim2:#50505e;
--accent:#00d4ff;--accent2:#00b8db;--accent-glow:rgba(0,212,255,.12);
--accent-glow2:rgba(0,212,255,.06);
--warn:#ff5c5c;--green:#34d399;--orange:#fb923c;
--radius:10px;--radius-sm:6px;--radius-lg:14px;
--font:'Inter',system-ui,-apple-system,sans-serif;
--shadow:0 4px 24px rgba(0,0,0,.4);
--shadow-sm:0 2px 8px rgba(0,0,0,.3);
}
html,body{width:100%;height:100%;overflow:hidden;font-family:var(--font);background:var(--bg);color:var(--text);font-size:13px;user-select:none;-webkit-font-smoothing:antialiased}
#app{display:flex;width:100%;height:100%;flex-direction:column}

/* ═══ TOOLBAR ═══ */
#toolbar{
  height:52px;background:var(--panel);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 16px;gap:6px;z-index:100;flex-shrink:0;
  backdrop-filter:blur(20px);
}
#toolbar .logo{
  font-weight:800;font-size:16px;letter-spacing:2px;color:var(--accent);margin-right:8px;
  text-shadow:0 0 20px rgba(0,212,255,.3);
}
#toolbar .sep{width:1px;height:24px;background:var(--border2);margin:0 4px;flex-shrink:0}
.tb-group{display:flex;align-items:center;gap:3px;background:var(--panel2);border:1px solid var(--border);border-radius:var(--radius);padding:3px;flex-shrink:0}
.tb-btn{
  background:transparent;border:1px solid transparent;color:var(--dim);
  padding:6px 8px;border-radius:var(--radius-sm);cursor:pointer;
  font-size:11px;font-weight:500;font-family:var(--font);
  display:flex;align-items:center;gap:4px;transition:all .2s ease;
  white-space:nowrap;flex-shrink:0;
}
.tb-btn:hover{color:var(--text);background:rgba(255,255,255,.05)}
.tb-btn.active{color:var(--accent);background:var(--accent-glow);border-color:rgba(0,212,255,.2)}
.tb-btn .tb-label{font-size:11px;letter-spacing:.02em}

/* Gizmo toggle pills */
#gizmo-modes{display:flex;gap:2px;background:var(--panel2);border:1px solid var(--border);border-radius:var(--radius);padding:3px;flex-shrink:0}
#gizmo-modes .gm{
  padding:5px 10px;cursor:pointer;border-radius:var(--radius-sm);
  font-size:11px;font-weight:600;color:var(--dim);transition:all .2s ease;font-family:var(--font);
}
#gizmo-modes .gm:hover{color:var(--text);background:rgba(255,255,255,.04)}
#gizmo-modes .gm.active{background:var(--accent-glow);color:var(--accent);box-shadow:0 0 12px rgba(0,212,255,.1)}

.tb-spacer{flex:1;min-width:0}
.tb-stat{font-size:11px;color:var(--dim);display:flex;align-items:center;gap:4px;flex-shrink:0;font-weight:500}
.tb-stat strong{color:var(--text2);font-weight:600}

/* ═══ MAIN LAYOUT ═══ */
#main{display:flex;flex:1;overflow:hidden}

/* ═══ SIDEBAR ═══ */
#sidebar{width:240px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;z-index:50}
#sidebar-tabs{display:flex;padding:6px 6px 0;gap:2px}
.stab{
  flex:1;padding:8px 6px;text-align:center;font-size:10px;font-weight:600;
  text-transform:uppercase;letter-spacing:.8px;color:var(--dim);cursor:pointer;
  border-radius:var(--radius-sm) var(--radius-sm) 0 0;transition:all .2s ease;
  border-bottom:2px solid transparent;
}
.stab.active{color:var(--accent);background:var(--accent-glow2);border-bottom-color:var(--accent)}
.stab:hover:not(.active){color:var(--text2);background:rgba(255,255,255,.02)}
#sidebar-content{flex:1;overflow-y:auto;padding:10px 8px}
#sidebar-content::-webkit-scrollbar{width:4px}
#sidebar-content::-webkit-scrollbar-track{background:transparent}
#sidebar-content::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:4px}
#sidebar-content::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.15)}
.cat-label{
  font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;
  color:var(--dim2);padding:14px 4px 8px;display:flex;align-items:center;justify-content:space-between;
}
.cat-label span{font-size:9px;color:var(--dim2);background:var(--panel2);padding:2px 6px;border-radius:10px}
.comp-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;padding:0 0 6px}
.comp-item{
  background:var(--panel2);border:1px solid var(--border);border-radius:var(--radius);
  padding:10px 6px 8px;cursor:grab;text-align:center;transition:all .2s ease;position:relative;
}
.comp-item:hover{border-color:rgba(0,212,255,.25);background:var(--accent-glow2);transform:translateY(-1px);box-shadow:var(--shadow-sm)}
.comp-item:active{transform:scale(.97)}
.comp-item .ci-icon{font-size:20px;margin-bottom:3px;display:block;filter:saturate(.8)}
.comp-item .ci-name{font-size:10px;font-weight:600;color:var(--text2);line-height:1.3}
.comp-item .ci-tag{font-size:8px;color:var(--dim2);margin-top:2px;font-weight:500}

/* ═══ VIEWPORT ═══ */
#viewport-wrap{flex:1;position:relative;overflow:hidden;background:#000}
#viewport{width:100%;height:100%;display:block}

/* ═══ INSPECTOR ═══ */
#inspector{width:260px;background:var(--panel);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;z-index:50}
#insp-header{
  padding:12px 14px;border-bottom:1px solid var(--border);font-weight:600;font-size:12px;
  display:flex;align-items:center;gap:8px;
}
#insp-header .dot{width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px rgba(0,212,255,.4)}
#insp-body{flex:1;overflow-y:auto;padding:12px}
#insp-body::-webkit-scrollbar{width:4px}
#insp-body::-webkit-scrollbar-track{background:transparent}
#insp-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:4px}
.insp-section{margin-bottom:16px}
.insp-section-title{
  font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;
  color:var(--dim2);margin-bottom:8px;display:flex;align-items:center;gap:6px;
  padding-bottom:6px;border-bottom:1px solid var(--border);
}
.insp-row{display:flex;align-items:center;margin-bottom:5px;gap:6px}
.insp-row label{width:52px;font-size:10px;color:var(--dim);flex-shrink:0;font-weight:500}
.insp-row input[type="number"],.insp-row input[type="text"]{
  flex:1;background:var(--bg);border:1px solid var(--border2);color:var(--text);
  padding:6px 8px;border-radius:var(--radius-sm);font-size:11px;font-family:var(--font);
  outline:none;transition:all .2s ease;
}
.insp-row input:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(0,212,255,.1)}
.insp-row select{
  flex:1;background:var(--bg);border:1px solid var(--border2);color:var(--text);
  padding:6px 8px;border-radius:var(--radius-sm);font-size:11px;outline:none;cursor:pointer;
  font-family:var(--font);
}
.xyz-inputs{display:flex;gap:3px;flex:1}
.xyz-inputs input{width:100%;text-align:center;padding:5px 2px;font-size:10px}
.xyz-inputs .xl{border-color:rgba(229,64,64,.4)}
.xyz-inputs .xl:focus{border-color:#e54040;box-shadow:0 0 0 2px rgba(229,64,64,.1)}
.xyz-inputs .yl{border-color:rgba(64,192,64,.4)}
.xyz-inputs .yl:focus{border-color:#40c040;box-shadow:0 0 0 2px rgba(64,192,64,.1)}
.xyz-inputs .zl{border-color:rgba(64,128,229,.4)}
.xyz-inputs .zl:focus{border-color:#4080e5;box-shadow:0 0 0 2px rgba(64,128,229,.1)}
.color-swatch{width:28px;height:28px;border-radius:var(--radius-sm);border:2px solid var(--border2);cursor:pointer;flex-shrink:0}
.insp-btn{
  background:var(--panel2);border:1px solid var(--border2);color:var(--text2);
  padding:6px 10px;border-radius:var(--radius-sm);cursor:pointer;font-size:10px;
  font-weight:600;transition:all .2s ease;text-align:center;font-family:var(--font);
}
.insp-btn:hover{border-color:rgba(0,212,255,.3);color:var(--accent);background:var(--accent-glow2)}
.insp-btn.danger{color:var(--warn)}
.insp-btn.danger:hover{border-color:rgba(255,92,92,.3);background:rgba(255,92,92,.06)}
.insp-actions{display:flex;gap:4px;flex-wrap:wrap}
#hierarchy{max-height:180px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--radius-sm);margin-top:6px}
.hier-item{
  padding:6px 8px;font-size:10px;cursor:pointer;display:flex;align-items:center;gap:6px;
  border-bottom:1px solid var(--border);transition:all .15s ease;font-weight:500;
}
.hier-item:last-child{border-bottom:none}
.hier-item:hover{background:rgba(255,255,255,.03)}
.hier-item.selected{background:var(--accent-glow);color:var(--accent)}
.hier-item .hi-icon{font-size:12px}

/* ═══ BOTTOM BAR ═══ */
#bottom-bar{
  height:30px;background:var(--panel);border-top:1px solid var(--border);
  display:flex;align-items:center;padding:0 14px;font-size:10px;color:var(--dim2);gap:16px;
  font-weight:500;
}
#snap-indicator{display:flex;align-items:center;gap:5px}
#snap-indicator .dot{width:5px;height:5px;border-radius:50%}

/* ═══ TEMPLATE CARDS ═══ */
.template-card{
  background:var(--panel2);border:1px solid var(--border);border-radius:var(--radius);
  padding:14px;margin-bottom:6px;cursor:pointer;transition:all .2s ease;
}
.template-card:hover{border-color:rgba(0,212,255,.25);transform:translateY(-1px);box-shadow:var(--shadow-sm)}
.template-card h4{font-size:12px;font-weight:600;margin-bottom:4px;color:var(--text)}
.template-card p{font-size:10px;color:var(--dim);line-height:1.5}

/* ═══ OVERLAYS ═══ */
#overlay-msg{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  background:rgba(10,10,12,.9);padding:20px 36px;border-radius:var(--radius-lg);
  font-size:15px;font-weight:700;pointer-events:none;opacity:0;transition:opacity .3s;
  z-index:200;text-align:center;border:1px solid var(--border2);
  backdrop-filter:blur(12px);box-shadow:var(--shadow);
}
#overlay-msg.show{opacity:1}
.env-row{display:flex;gap:4px;margin-bottom:6px}
.env-btn{
  flex:1;padding:7px 4px;background:var(--panel2);border:1px solid var(--border);
  border-radius:var(--radius-sm);color:var(--dim);font-size:10px;font-weight:600;
  cursor:pointer;text-align:center;transition:all .2s ease;font-family:var(--font);
}
.env-btn:hover{border-color:var(--border2);color:var(--text2)}
.env-btn.active{border-color:rgba(0,212,255,.3);color:var(--accent);background:var(--accent-glow2)}
.slider-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.slider-row label{width:65px;font-size:10px;color:var(--dim);flex-shrink:0;font-weight:500}
.slider-row input[type="range"]{flex:1;accent-color:var(--accent);height:3px;border-radius:2px}
.slider-row .val{width:34px;font-size:10px;color:var(--dim2);text-align:right;font-weight:500}

/* ═══ CONTEXT MENU ═══ */
#context-menu{
  position:fixed;background:var(--panel2);border:1px solid var(--border2);
  border-radius:var(--radius);padding:5px;z-index:999;display:none;min-width:170px;
  box-shadow:0 12px 40px rgba(0,0,0,.6);backdrop-filter:blur(16px);
}
#context-menu .cm-item{
  padding:7px 12px;font-size:11px;cursor:pointer;border-radius:var(--radius-sm);
  display:flex;align-items:center;gap:8px;transition:all .12s ease;font-weight:500;
}
#context-menu .cm-item:hover{background:rgba(255,255,255,.06)}
#context-menu .cm-sep{height:1px;background:var(--border);margin:4px 8px}
#flythrough-overlay{
  position:absolute;top:14px;left:50%;transform:translateX(-50%);
  background:rgba(10,10,12,.85);border:1px solid var(--accent);border-radius:24px;
  padding:8px 24px;font-size:12px;font-weight:600;color:var(--accent);display:none;
  z-index:150;backdrop-filter:blur(12px);box-shadow:0 0 20px rgba(0,212,255,.15);
}
.search-box{
  width:100%;background:var(--bg);border:1px solid var(--border2);color:var(--text);
  padding:8px 12px;border-radius:var(--radius);font-size:11px;margin-bottom:10px;
  outline:none;font-family:var(--font);transition:all .2s ease;font-weight:500;
}
.search-box::placeholder{color:var(--dim2)}
.search-box:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,212,255,.08)}
.toast{
  position:fixed;bottom:50px;left:50%;transform:translateX(-50%);
  background:var(--panel3);border:1px solid rgba(0,212,255,.25);color:var(--accent);
  padding:10px 24px;border-radius:24px;font-size:12px;font-weight:600;z-index:300;
  opacity:0;transition:all .3s ease;pointer-events:none;
  backdrop-filter:blur(12px);box-shadow:0 4px 20px rgba(0,0,0,.4);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}
input[type="color"]{-webkit-appearance:none;border:none;width:28px;height:28px;border-radius:var(--radius-sm);cursor:pointer;padding:0}
input[type="color"]::-webkit-color-swatch-wrapper{padding:2px}
input[type="color"]::-webkit-color-swatch{border:none;border-radius:4px}

/* ═══ MOBILE TOGGLE BUTTONS ═══ */
.mobile-toggle{
  display:none;position:fixed;z-index:200;width:44px;height:44px;
  border-radius:50%;border:1px solid var(--border2);
  background:var(--panel2);color:var(--text2);font-size:18px;
  cursor:pointer;align-items:center;justify-content:center;
  box-shadow:0 4px 16px rgba(0,0,0,.5);backdrop-filter:blur(12px);
  transition:all .2s ease;-webkit-tap-highlight-color:transparent;
}
.mobile-toggle:hover,.mobile-toggle:active{
  background:var(--accent-glow);border-color:rgba(0,212,255,.3);color:var(--accent);
}
.mobile-toggle.active{
  background:var(--accent);color:var(--bg);border-color:var(--accent);
}
#toggle-sidebar{bottom:80px;left:14px}
#toggle-inspector{bottom:80px;right:14px}
#toggle-toolbar-mobile{top:60px;right:14px}

/* Mobile bottom nav */
#mobile-nav{
  display:none;height:56px;background:var(--panel);
  border-top:1px solid var(--border);
  align-items:center;justify-content:space-around;padding:0 8px;
  z-index:100;flex-shrink:0;
}
.mobile-nav-btn{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  background:none;border:none;color:var(--dim);cursor:pointer;
  padding:6px 12px;border-radius:var(--radius-sm);transition:all .15s;
  -webkit-tap-highlight-color:transparent;font-family:var(--font);
}
.mobile-nav-btn:active{transform:scale(.92)}
.mobile-nav-btn.active{color:var(--accent)}
.mobile-nav-btn .mn-icon{font-size:20px;line-height:1}
.mobile-nav-btn .mn-label{font-size:9px;font-weight:600;letter-spacing:.3px}

/* ═══ RESPONSIVE: TABLET (≤1024px) ═══ */
@media(max-width:1024px){
  #toolbar{height:48px;padding:0 10px;gap:4px}
  #toolbar .logo{font-size:14px;margin-right:4px}
  .tb-group{padding:2px;gap:2px}
  .tb-btn{padding:5px 6px;font-size:10px}
  #gizmo-modes .gm{padding:4px 8px;font-size:10px}
  #sidebar{width:210px}
  #inspector{width:230px}
  .tb-stat{display:none}
  #bottom-bar{display:none}
}

/* ═══ RESPONSIVE: MOBILE (≤768px) ═══ */
@media(max-width:768px){
  #toolbar{
    height:48px;padding:0 8px;gap:4px;
    overflow-x:auto;overflow-y:hidden;
    -webkit-overflow-scrolling:touch;
    scrollbar-width:none;
  }
  #toolbar::-webkit-scrollbar{display:none}
  #toolbar .logo{font-size:13px;letter-spacing:1.5px;margin-right:4px;flex-shrink:0}
  #toolbar .sep{height:20px;margin:0 2px}
  .tb-group{padding:2px;gap:1px}
  .tb-btn{padding:4px 6px;font-size:10px;gap:3px}
  .tb-btn .tb-label{font-size:10px}
  #gizmo-modes{padding:2px;gap:1px}
  #gizmo-modes .gm{padding:4px 7px;font-size:10px}
  .tb-spacer{min-width:4px;flex:0 0 auto}

  #sidebar{
    position:fixed;left:0;top:0;bottom:0;width:260px;
    z-index:300;transform:translateX(-100%);
    transition:transform .3s cubic-bezier(.4,0,.2,1);
    box-shadow:8px 0 32px rgba(0,0,0,.5);
  }
  #sidebar.open{transform:translateX(0)}

  #inspector{
    position:fixed;right:0;top:0;bottom:0;width:280px;
    z-index:300;transform:translateX(100%);
    transition:transform .3s cubic-bezier(.4,0,.2,1);
    box-shadow:-8px 0 32px rgba(0,0,0,.5);
  }
  #inspector.open{transform:translateX(0)}

  .mobile-toggle{display:flex}
  #mobile-nav{display:flex}
  #bottom-bar{display:none}

  /* Mobile overlay backdrop */
  .mobile-backdrop{
    position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:250;
    opacity:0;pointer-events:none;transition:opacity .3s ease;
  }
  .mobile-backdrop.show{opacity:1;pointer-events:auto}

  /* Touch-friendly component items */
  .comp-item{padding:12px 8px 10px;min-height:56px}
  .comp-item .ci-icon{font-size:22px}
  .comp-item .ci-name{font-size:11px}

  /* Touch-friendly inspector inputs */
  .insp-row input[type="number"],.insp-row input[type="text"]{padding:8px 10px;font-size:12px}
  .insp-row select{padding:8px 10px;font-size:12px}
  .insp-btn{padding:10px 12px;font-size:11px}
  .insp-section-title{font-size:10px;margin-bottom:10px}

  /* Sidebar tabs larger on mobile */
  .stab{padding:10px 6px;font-size:10px}

  /* Search box bigger tap target */
  .search-box{padding:10px 14px;font-size:12px}

  /* Template cards larger */
  .template-card{padding:16px}
  .template-card h4{font-size:13px}
  .template-card p{font-size:11px}

  /* Context menu touch-friendly */
  #context-menu .cm-item{padding:12px 16px;font-size:12px}

  /* Toast above mobile nav */
  .toast{bottom:80px}
}

/* ═══ RESPONSIVE: SMALL PHONE (≤480px) ═══ */
@media(max-width:480px){
  #toolbar{height:44px;padding:0 6px;gap:3px}
  #toolbar .logo{font-size:12px;letter-spacing:1px}
  .tb-btn .tb-label{display:none}
  .tb-btn::after{content:attr(data-short);font-size:10px;font-weight:600}
  #gizmo-modes .gm{padding:4px 6px;font-size:9px}
  #sidebar.open{width:100%}
  #inspector.open{width:100%}
  .mobile-toggle{width:40px;height:40px;font-size:16px}
  #toggle-sidebar{bottom:72px;left:10px}
  #toggle-inspector{bottom:72px;right:10px}
  #mobile-nav{height:52px}
  .mobile-nav-btn .mn-icon{font-size:18px}
  .mobile-nav-btn .mn-label{font-size:8px}
}
</style>
</head>
<body>
<div id="app">
<div id="toolbar">
  <span class="logo">GRINDLAB</span>
  <div class="sep"></div>
  <div class="tb-group">
    <button class="tb-btn" id="btn-new" title="New Park" data-short="New"><span class="tb-label">New</span></button>
    <button class="tb-btn" id="btn-save" title="Save" data-short="Save"><span class="tb-label">Save</span></button>
    <button class="tb-btn" id="btn-load" title="Load" data-short="Load"><span class="tb-label">Load</span></button>
    <button class="tb-btn" id="btn-export" title="Export GLB" data-short="Exp"><span class="tb-label">Export</span></button>
  </div>
  <div class="sep"></div>
  <div class="tb-group">
    <button class="tb-btn" id="btn-undo" title="Undo (Ctrl+Z)" data-short="↩"><span class="tb-label">Undo</span></button>
    <button class="tb-btn" id="btn-redo" title="Redo (Ctrl+Y)" data-short="↪"><span class="tb-label">Redo</span></button>
  </div>
  <div class="sep"></div>
  <div id="gizmo-modes">
    <span class="gm active" data-mode="translate" title="Move (W)">Move</span>
    <span class="gm" data-mode="rotate" title="Rotate (E)">Rotate</span>
    <span class="gm" data-mode="scale" title="Scale (R)">Scale</span>
  </div>
  <div class="sep"></div>
  <div class="tb-group">
    <button class="tb-btn" id="btn-snap" title="Toggle Snap" data-short="Snp"><span class="tb-label">Snap</span></button>
    <button class="tb-btn" id="btn-grid" title="Toggle Grid" data-short="Grd"><span class="tb-label">Grid</span></button>
  </div>
  <div class="sep"></div>
  <div class="tb-group">

{

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { TransformControls } from 'three/addons/controls/TransformControls.js';
import { GLTFExporter } from 'three/addons/exporters/GLTFExporter.js';

// ===== GLOBALS =====
let scene, camera, renderer, orbitControls, transformControls;
let gridHelper, ground;
let parkObjects = [];

let snapEnabled = true;
let snapSize = 0.5;

// ===== PROCEDURAL TEXTURE GENERATORS =====
const TexGen = {
  _cache: {},
  _get(key, size, drawFn) {
    if (this._cache[key]) return this._cache[key];
    const c = document.createElement('canvas');
    c.width = c.height = size;
    const ctx = c.getContext('2d');
    drawFn(ctx, size);
    const tex = new THREE.CanvasTexture(c);
    tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
    this._cache[key] = tex;
    return tex;
  },
  noise(ctx, x, y, scale) {
    return (Math.sin(x * 12.9898 + y * 78.233 + scale) * 43758.5453) % 1;
  },
  concrete(size = 512) {
    return this._get('concrete', size, (ctx, s) => {
      // Base warm gray
      ctx.fillStyle = '#908a82';
      ctx.fillRect(0, 0, s, s);
      // Aggregate noise
      const imgData = ctx.getImageData(0, 0, s, s);
      const d = imgData.data;
      for (let i = 0; i < d.length; i += 4) {
        const px = (i / 4) % s, py = Math.floor((i / 4) / s);
        const n1 = this.noise(null, px * 0.08, py * 0.08, 1) * 20 - 10;
        const n2 = this.noise(null, px * 0.3, py * 0.3, 2) * 12 - 6;
        const n3 = this.noise(null, px * 1.2, py * 1.2, 3) * 6 - 3;
        const v = n1 + n2 + n3;
        d[i] = Math.min(255, Math.max(0, d[i] + v));
        d[i+1] = Math.min(255, Math.max(0, d[i+1] + v));
        d[i+2] = Math.min(255, Math.max(0, d[i+2] + v - 2));
      }
      ctx.putImageData(imgData, 0, 0);
      // Subtle trowel marks
      ctx.globalAlpha = 0.04;
      ctx.strokeStyle = '#666';
      for (let i = 0; i < 30; i++) {
        ctx.beginPath();
        const y = Math.random() * s;
        ctx.moveTo(0, y + Math.random() * 20);
        ctx.quadraticCurveTo(s * 0.5, y + Math.random() * 8, s, y + Math.random() * 20);
        ctx.lineWidth = 1 + Math.random() * 2;
        ctx.stroke();
      }
      // Hairline cracks
      ctx.globalAlpha = 0.08;
      ctx.strokeStyle = '#3a3530';
      for (let i = 0; i < 6; i++) {
        ctx.beginPath();
        let cx = Math.random() * s, cy = Math.random() * s;
        ctx.moveTo(cx, cy);
        for (let j = 0; j < 8; j++) {
          cx += (Math.random() - 0.5) * 60;
          cy += (Math.random() - 0.3) * 50;
          ctx.lineTo(cx, cy);
        }
        ctx.lineWidth = 0.5 + Math.random();
        ctx.stroke();
      }
      // Stain patches
      ctx.globalAlpha = 0.03;
      for (let i = 0; i < 8; i++) {
        ctx.fillStyle = Math.random() > 0.5 ? '#4a4238' : '#6a6358';
        ctx.beginPath();
        ctx.ellipse(Math.random() * s, Math.random() * s, 15 + Math.random() * 40, 10 + Math.random() * 30, Math.random() * Math.PI, 0, Math.PI * 2);
        ctx.fill();
      }
    });
  },
  concreteBump(size = 512) {
    return this._get('concreteBump', size, (ctx, s) => {
      ctx.fillStyle = '#808080';
      ctx.fillRect(0, 0, s, s);
      const imgData = ctx.getImageData(0, 0, s, s);
      const d = imgData.data;
      for (let i = 0; i < d.length; i += 4) {
        const px = (i / 4) % s, py = Math.floor((i / 4) / s);
        const n = this.noise(null, px * 0.15, py * 0.15, 5) * 30 +
                  this.noise(null, px * 0.6, py * 0.6, 6) * 15 +
                  this.noise(null, px * 2.0, py * 2.0, 7) * 8;
        const v = 128 + n;
        d[i] = d[i+1] = d[i+2] = Math.min(255, Math.max(0, v));
      }
      ctx.putImageData(imgData, 0, 0);
      // Bump from cracks
      ctx.globalAlpha = 0.3;
      ctx.strokeStyle = '#333';
      for (let i = 0; i < 5; i++) {
        ctx.beginPath();
        let cx = Math.random() * s, cy = Math.random() * s;
        ctx.moveTo(cx, cy);
        for (let j = 0; j < 6; j++) {
          cx += (Math.random() - 0.5) * 50;
          cy += (Math.random() - 0.3) * 40;
          ctx.lineTo(cx, cy);
        }
        ctx.lineWidth = 1;
        ctx.stroke();
      }
    });
  },
  concreteDark(size = 512) {
    return this._get('concreteDark', size, (ctx, s) => {
      ctx.fillStyle = '#625c55';
      ctx.fillRect(0, 0, s, s);
      const imgData = ctx.getImageData(0, 0, s, s);
      const d = imgData.data;
      for (let i = 0; i < d.length; i += 4) {
        const px = (i / 4) % s, py = Math.floor((i / 4) / s);
        const n = this.noise(null, px * 0.1, py * 0.1, 10) * 16 - 8;
        d[i] = Math.min(255, Math.max(0, d[i] + n));
        d[i+1] = Math.min(255, Math.max(0, d[i+1] + n));
        d[i+2] = Math.min(255, Math.max(0, d[i+2] + n));
      }
      ctx.putImageData(imgData, 0, 0);
      // Wear streaks
      ctx.globalAlpha = 0.05;
      ctx.strokeStyle = '#888';
      for (let i = 0; i < 15; i++) {
        ctx.beginPath();
        ctx.moveTo(Math.random() * s, Math.random() * s);
        ctx.lineTo(Math.random() * s, Math.random() * s);
        ctx.lineWidth = 2 + Math.random() * 4;
        ctx.stroke();
      }
    });
  },
  concreteSmooth(size = 512) {
    return this._get('concreteSmooth', size, (ctx, s) => {
      ctx.fillStyle = '#9e9890';
      ctx.fillRect(0, 0, s, s);
      const imgData = ctx.getImageData(0, 0, s, s);
      const d = imgData.data;
      for (let i = 0; i < d.length; i += 4) {
        const px = (i / 4) % s, py = Math.floor((i / 4) / s);
        const n = this.noise(null, px * 0.05, py * 0.05, 20) * 10 - 5;
        d[i] = Math.min(255, Math.max(0, d[i] + n));
        d[i+1] = Math.min(255, Math.max(0, d[i+1] + n));
        d[i+2] = Math.min(255, Math.max(0, d[i+2] + n));
      }
      ctx.putImageData(imgData, 0, 0);
      // Polished wear bands (from skateboard wheels)
      ctx.globalAlpha = 0.06;
      ctx.fillStyle = '#b8b0a5';
      for (let i = 0; i < 5; i++) {
        ctx.fillRect(0, Math.random() * s, s, 3 + Math.random() * 8);
      }
    });
  },
  bowlWear(size = 512) {
    return this._get('bowlWear', size, (ctx, s) => {
      ctx.fillStyle = '#968e84';
      ctx.fillRect(0, 0, s, s);
      const imgData = ctx.getImageData(0, 0, s, s);
      const d = imgData.data;
      for (let i = 0; i < d.length; i += 4) {
        const px = (i / 4) % s, py = Math.floor((i / 4) / s);
        const n = this.noise(null, px * 0.06, py * 0.06, 30) * 14 - 7;
        d[i] = Math.min(255, Math.max(0, d[i] + n));
        d[i+1] = Math.min(255, Math.max(0, d[i+1] + n));
        d[i+2] = Math.min(255, Math.max(0, d[i+2] + n - 1));
      }
      ctx.putImageData(imgData, 0, 0);
      // Wheel wear arcs (curved polished lines from carving)
      ctx.globalAlpha = 0.07;
      ctx.strokeStyle = '#b5ada2';
      for (let i = 0; i < 12; i++) {
        ctx.beginPath();
        const cx = Math.random() * s, cy = Math.random() * s;
        const r = 40 + Math.random() * 120;
        ctx.arc(cx, cy, r, Math.random() * Math.PI, Math.random() * Math.PI + 1);
        ctx.lineWidth = 2 + Math.random() * 5;
        ctx.stroke();
      }
      // Dark wear near bottom
      const grad = ctx.createLinearGradient(0, 0, 0, s);
      grad.addColorStop(0, 'rgba(0,0,0,0)');
      grad.addColorStop(0.7, 'rgba(0,0,0,0.04)');
      grad.addColorStop(1, 'rgba(0,0,0,0.08)');
      ctx.fillStyle = grad;
      ctx.globalAlpha = 1;
      ctx.fillRect(0, 0, s, s);
    });
  },
  metal(size = 256) {
    return this._get('metal', size, (ctx, s) => {
      ctx.fillStyle = '#a8a8a8';
      ctx.fillRect(0, 0, s, s);
      // Brushed effect
      ctx.globalAlpha = 0.03;
      ctx.strokeStyle = '#ccc';
      for (let i = 0; i < 200; i++) {
        ctx.beginPath();
        const y = Math.random() * s;
        ctx.moveTo(0, y);
        ctx.lineTo(s, y + (Math.random() - 0.5) * 4);
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
      // Scratches
      ctx.globalAlpha = 0.06;
      ctx.strokeStyle = '#666';
      for (let i = 0; i < 15; i++) {
        ctx.beginPath();
        ctx.moveTo(Math.random() * s, Math.random() * s);
        ctx.lineTo(Math.random() * s, Math.random() * s);
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
    });
  },
  wood(size = 512) {
    return this._get('wood', size, (ctx, s) => {
      ctx.fillStyle = '#8B6914';
      ctx.fillRect(0, 0, s, s);
      // Wood grain
      ctx.globalAlpha = 0.08;
      for (let i = 0; i < 80; i++) {
        ctx.strokeStyle = i % 3 === 0 ? '#5a3d10' : '#a07820';
        ctx.beginPath();
        const y = i * (s / 80) + Math.random() * 4;
        ctx.moveTo(0, y);
        ctx.quadraticCurveTo(s * 0.5, y + (Math.random() - 0.5) * 6, s, y + (Math.random() - 0.5) * 3);
        ctx.lineWidth = 1 + Math.random() * 2;
        ctx.stroke();
      }
    });
  }
};

// ===== INIT =====
function init() {
  const canvas = document.getElementById('viewport');
  renderer = new THREE.WebGLRenderer({ canvas, antialias: true, preserveDrawingBuffer: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(canvas.parentElement.clientWidth, canvas.parentElement.clientHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.0;
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  renderer.localClippingEnabled = true;
  renderer.physicallyCorrectLights = true;

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x8bb8d8);
  scene.fog = new THREE.FogExp2(0x8bb8d8, 0.006);

  camera = new THREE.PerspectiveCamera(50, canvas.parentElement.clientWidth / canvas.parentElement.clientHeight, 0.1, 500);
  camera.position.set(12, 10, 12);

  orbitControls = new OrbitControls(camera, canvas);
  orbitControls.enableDamping = true;
  orbitControls.dampingFactor = 0.08;
  orbitControls.maxPolarAngle = Math.PI / 2.05;
  orbitControls.target.set(0, 0, 0);

  transformControls = new TransformControls(camera, canvas);
  transformControls.setMode('translate');
  transformControls.setTranslationSnap(snapSize);
  scene.add(transformControls);

  transformControls.addEventListener('dragging-changed', e => {
    orbitControls.enabled = !e.value;
    if (!e.value && selectedObject) {
      pushUndo('transform');
    }
  });

  setupLights();
  setupGround();
  setupGrid();

  // Events
  canvas.addEventListener('pointerdown', onPointerDown);
  canvas.addEventListener('pointermove', onPointerMove);
  canvas.addEventListener('contextmenu', onContextMenu);
  window.addEventListener('keydown', onKeyDown);
  window.addEventListener('resize', onResize);

  // UI
  initSidebar();
  initToolbar();
  initContextMenu();
  initMobile();

  // Seed scene with the Competition Park so users start with something to explore
  loadDefaultPark();

  animate();
}

function loadDefaultPark() {
  const tmpl = TEMPLATES.find(t => t.id === 'competition');
  if (!tmpl) return;
  tmpl.objects.forEach(o => {
    addParkObject(o.type, o.pos, o.rot, o.params);
  });
  // Set a nice camera angle to show off the park
  camera.position.set(17.97, 14.02, 18.01);
  orbitControls.target.set(0, 0, 0);
  orbitControls.update();
  // Clear undo stack so the default park isn't "undoable"
  undoStack.length = 0;
  redoStack.length = 0;
}

// ===== GEOMETRY BUILDERS =====
function buildQuarterPipe(params) {
  const { width=3, height=1.2, depth=2.5, copingRadius=0.04 } = params;
  const group = new THREE.Group();
  const segments = 24;
  const deckExt = 0.35;
  const thickness = 0.12;

  // Solid quarter pipe cross-section in XY, extruded along Z (width)
  // The curve goes from ground (front) up to the deck (back/top)
  // We trace the outer surface, then the back wall, then the underside back
  const shape = new THREE.Shape();

  // Start at front-bottom (ground level, front of ramp)
  shape.moveTo(0, 0);

  // Outer curved surface: quarter arc from ground up to top
  // At angle=0: bottom of curve at (0, 0)
  // At angle=PI/2: top of curve at (depth, height)
  for (let i = 1; i <= segments; i++) {
    const a = (Math.PI / 2) * (i / segments);
    const x = Math.sin(a) * depth;
    const y = (1 - Math.cos(a)) * height;
    shape.lineTo(x, y);
  }

  // Deck platform extends backward from top of curve
  shape.lineTo(depth + deckExt, height);

  // Down the back wall
  shape.lineTo(depth + deckExt, 0);

  // Close back to start along the ground
  shape.closePath();

  const extOpts = { depth: width, bevelEnabled: false };
  const geo = new THREE.ExtrudeGeometry(shape, extOpts);
  // Center along Z (width axis)
  geo.translate(0, 0, -width / 2);
  const mesh = new THREE.Mesh(geo, Materials.concrete());
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  group.add(mesh);

  // Coping pipe at the top lip of the curve
  if (copingRadius > 0) {
    const copingGeo = new THREE.CylinderGeometry(copingRadius, copingRadius, width, 12);
    copingGeo.rotateX(Math.PI / 2);
    const copingMesh = new THREE.Mesh(copingGeo, Materials.coping());
    copingMesh.position.set(depth, height + copingRadius * 0.5, 0);
    copingMesh.castShadow = true;
    group.add(copingMesh);
  }

  return group;
}

function buildHalfPipe(params) {
  const { width=4, height=1.8, depth=3, flatBottom=2, copingRadius=0.04 } = params;
  const group = new THREE.Group();
  const segments = 24;
  const thickness = 0.15;
  const deckExt = 0.35;
  const baseThick = 0.08; // extra thickness so the bottom sits above ground
  const halfFlat = flatBottom / 2;
  const halfW = width / 2;

  // Profile points for the skating surface (raised by baseThick)
  const profile = [];

  // Left deck
  profile.push({ x: -(halfFlat + depth + deckExt), y: height + baseThick, nx: 0, ny: 1 });
  profile.push({ x: -(halfFlat + depth), y: height + baseThick, nx: 0, ny: 1 });

  // Left transition curve (top to bottom)
  for (let i = 0; i <= segments; i++) {
    const a = (Math.PI / 2) * (1 - i / segments);
    const x = -(halfFlat + Math.sin(a) * depth);
    const y = (1 - Math.cos(a)) * height + baseThick;
    profile.push({ x, y, nx: -Math.cos(a), ny: Math.sin(a) });
  }

  // Flat bottom
  profile.push({ x: halfFlat, y: baseThick, nx: 0, ny: 1 });

  // Right transition curve (bottom to top)
  for (let i = 0; i <= segments; i++) {
    const a = (Math.PI / 2) * (i / segments);
    const x = halfFlat + Math.sin(a) * depth;
    const y = (1 - Math.cos(a)) * height + baseThick;
    profile.push({ x, y, nx: Math.cos(a), ny: Math.sin(a) });
  }

  // Right deck
  profile.push({ x: halfFlat + depth, y: height + baseThick, nx: 0, ny: 1 });
  profile.push({ x: halfFlat + depth + deckExt, y: height + baseThick, nx: 0, ny: 1 });

  const pLen = profile.length;

  // Bottom profile: offset downward by thickness, clamped to ground (0)
  const bottomProfile = profile.map(p => ({
    x: p.x,
    y: Math.max(p.y - thickness, 0),
    nx: p.nx,
    ny: p.ny
  }));

  // Helper: build a surface strip along the profile, extruded across width
  const buildSurface = (prof, normalFlip) => {
    const verts = [], norms = [], uvs = [], idxs = [];
    for (let j = 0; j <= 1; j++) {
      const z = -halfW + j * width;
      for (let i = 0; i < pLen; i++) {
        const p = prof[i];
        verts.push(p.x, p.y, z);
        const nf = normalFlip ? -1 : 1;
        norms.push(p.nx * nf, p.ny * nf, 0);
        uvs.push(i / (pLen - 1), j);
      }
    }
    for (let i = 0; i < pLen - 1; i++) {
      const a = i, b = i + 1, c = i + pLen, d = i + 1 + pLen;
      if (normalFlip) { idxs.push(a, c, b, b, c, d); }
      else { idxs.push(a, b, c, b, d, c); }
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
    geo.setAttribute('normal', new THREE.Float32BufferAttribute(norms, 3));
    geo.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
    geo.setIndex(idxs);
    return geo;
  };

  // Top (skating) surface
  const topMesh = new THREE.Mesh(buildSurface(profile, false), Materials.concrete());
  topMesh.castShadow = true; topMesh.receiveShadow = true;
  group.add(topMesh);

  // Bottom (underside) surface
  const botMesh = new THREE.Mesh(buildSurface(bottomProfile, true), Materials.concreteDark());
  botMesh.castShadow = true; botMesh.receiveShadow = true;
  group.add(botMesh);

  // Side walls: full solid panels from top profile down to ground on each z-end
  const buildSideWall = (z, flip) => {
    const verts = [], norms = [], uvs = [], idxs = [];
    const nz = flip ? -1 : 1;
    for (let i = 0; i < pLen; i++) {
      const pt = profile[i];
      // top vertex at profile height
      verts.push(pt.x, pt.y, z);
      norms.push(0, 0, nz);
      uvs.push(i / (pLen - 1), 1);
      // bottom vertex at ground level
      verts.push(pt.x, 0, z);
      norms.push(0, 0, nz);
      uvs.push(i / (pLen - 1), 0);
    }
    for (let i = 0; i < pLen - 1; i++) {
      const t0 = i * 2, b0 = i * 2 + 1, t1 = (i + 1) * 2, b1 = (i + 1) * 2 + 1;
      if (flip) { idxs.push(t0, t1, b0, b0, t1, b1); }
      else { idxs.push(t0, b0, t1, b0, b1, t1); }
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
    geo.setAttribute('normal', new THREE.Float32BufferAttribute(norms, 3));
    geo.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
    geo.setIndex(idxs);
    return geo;
  };

  const sideMat = Materials.concreteDark();
  const sideA = new THREE.Mesh(buildSideWall(-halfW, true), sideMat);
  sideA.castShadow = true; sideA.receiveShadow = true;
  group.add(sideA);
  const sideB = new THREE.Mesh(buildSideWall(halfW, false), sideMat.clone());
  sideB.castShadow = true; sideB.receiveShadow = true;
  group.add(sideB);

  // Front/back edge strips: connect top and bottom profiles along each Z-end
  const buildEdgeStrip = (z, flip) => {
    const verts = [], norms = [], uvs = [], idxs = [];
    const nz = flip ? -1 : 1;
    for (let i = 0; i < pLen; i++) {
      const pt = profile[i];
      const bp = bottomProfile[i];
      // top vertex (skating surface edge)
      verts.push(pt.x, pt.y, z);
      norms.push(0, 0, nz);
      uvs.push(i / (pLen - 1), 1);
      // bottom vertex (underside edge)
      verts.push(bp.x, bp.y, z);
      norms.push(0, 0, nz);
      uvs.push(i / (pLen - 1), 0);
    }
    for (let i = 0; i < pLen - 1; i++) {
      const t0 = i * 2, b0 = i * 2 + 1, t1 = (i + 1) * 2, b1 = (i + 1) * 2 + 1;
      if (flip) { idxs.push(t0, t1, b0, b0, t1, b1); }
      else { idxs.push(t0, b0, t1, b0, b1, t1); }
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
    geo.setAttribute('normal', new THREE.Float32BufferAttribute(norms, 3));
    geo.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
    geo.setIndex(idxs);
    return geo;
  };

  const edgeFront = new THREE.Mesh(buildEdgeStrip(-halfW, true), Materials.concreteDark());
  edgeFront.castShadow = true; edgeFront.receiveShadow = true;
  group.add(edgeFront);
  const edgeBack = new THREE.Mesh(buildEdgeStrip(halfW, false), Materials.concreteDark());
  edgeBack.castShadow = true; edgeBack.receiveShadow = true;
  group.add(edgeBack);

  // Back walls: full height walls at both outer ends (left and right)
  const buildBackWall = (xPos, faceDir) => {
    const h = height + baseThick;
    const verts = [
      xPos, h, -halfW,
      xPos, h, halfW,
      xPos, 0, halfW,
      xPos, 0, -halfW,
    ];
    const nx = faceDir;
    const norms = [nx,0,0, nx,0,0, nx,0,0, nx,0,0];
    const uvs = [0,1, 1,1, 1,0, 0,0];
    const idxs = faceDir < 0 ? [0,2,1, 0,3,2] : [0,1,2, 0,2,3];
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
    geo.setAttribute('normal', new THREE.Float32BufferAttribute(norms, 3));
    geo.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
    geo.setIndex(idxs);
    return geo;
  };

  const leftX = -(halfFlat + depth + deckExt);
  const rightX = halfFlat + depth + deckExt;
  const backL = new THREE.Mesh(buildBackWall(leftX, -1), Materials.concreteDark());
  backL.castShadow = true; backL.receiveShadow = true;
  group.add(backL);
  const backR = new THREE.Mesh(buildBackWall(rightX, 1), Materials.concreteDark());
  backR.castShadow = true; backR.receiveShadow = true;
  group.add(backR);

  // Bottom ground plate: flat rectangle under the entire structure
  const groundGeo = new THREE.PlaneGeometry(rightX - leftX, width);
  groundGeo.rotateX(-Math.PI / 2);
  const groundPlate = new THREE.Mesh(groundGeo, Materials.concreteDark());
  groundPlate.position.set((leftX + rightX) / 2, 0.001, 0);
  groundPlate.receiveShadow = true;
  group.add(groundPlate);

  // Copings
  if (copingRadius > 0) {
    const cGeo = new THREE.CylinderGeometry(copingRadius, copingRadius, width, 12);
    cGeo.rotateX(Math.PI / 2);
    const c1 = new THREE.Mesh(cGeo, Materials.coping());
    c1.position.set(-(halfFlat + depth), height + baseThick + copingRadius * 0.5, 0);
    c1.castShadow = true;
    group.add(c1);
    const c2 = new THREE.Mesh(cGeo.clone(), Materials.coping());
    c2.position.set(halfFlat + depth, height + baseThick + copingRadius * 0.5, 0);
    c2.castShadow = true;
    group.add(c2);
  }

  return group;
}

function buildLaunchRamp(params) {
  const { width=2, height=0.8, depth=1.5, angle=35 } = params;
  const group = new THREE.Group();
  const segments = 12;

  const shape = new THREE.Shape();
  shape.moveTo(0, 0);
  const rad = height / (1 - Math.cos(angle * Math.PI / 180));
  for (let i = 0; i <= segments; i++) {
    const a = (angle * Math.PI / 180) * (i / segments);
    const x = Math.sin(a) * rad * (depth / (Math.sin(angle * Math.PI/180) * rad || 1));
    const y = (1 - Math.cos(a)) * rad * (height / ((1 - Math.cos(angle * Math.PI/180)) * rad || 1));
    shape.lineTo(x * depth / (depth || 1), y);
  }
  shape.lineTo(depth, 0);
  shape.lineTo(0, 0);

  const geo = new THREE.ExtrudeGeometry(shape, { depth: width, bevelEnabled: false });
  geo.translate(0, 0, -width/2);
  const mesh = new THREE.Mesh(geo, Materials.wood());
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  group.add(mesh);

  return group;
}

function buildBank(params) {

  const geo = new THREE.ExtrudeGeometry(shape, { depth: width, bevelEnabled: false });
  geo.translate(0, 0, -width/2);
  const mesh = new THREE.Mesh(geo, Materials.concrete());

  mesh.receiveShadow = true;

  return group;
}

function buildSpine(params) {
  const { width=3, height=1.5, depth=2, copingRadius=0.04 } = params;
  const group = new THREE.Group();
  const segments = 24;
  const halfW = width / 2;
  const deckExt = 0.6;

  // A spine is two quarter pipes back-to-back, sharing a peak at center.
  // Each side: flat deck at ground level on the outside, concave transition
  // curving up to the shared peak at (0, height).
  // Uses the same concave curve formula as buildQuarterPipe.

  for (let side = -1; side <= 1; side += 2) {
    const shape = new THREE.Shape();

    const deckOuter = side * (depth + deckExt);
    const curveStart = side * depth;

    // Start at deck outer edge, ground level
    shape.moveTo(deckOuter, 0);

    // Along ground to where the curve starts
    shape.lineTo(curveStart, 0);

    // Concave quarter-circle transition from ground up to the peak
    // x = side * depth * (1 - sin(a)), y = (1 - cos(a)) * height
    // At a=0: x = side*depth, y=0 (ground at curve start)
    // At a=PI/2: x = 0, y = height (center peak)
    for (let i = 1; i <= segments; i++) {
      const a = (Math.PI / 2) * (i / segments);
      const x = side * depth * (1 - Math.sin(a));
      const y = (1 - Math.cos(a)) * height;
      shape.lineTo(x, y);
    }

    // Down from center peak to ground
    shape.lineTo(0, 0);

    // Close back along ground to start
    shape.closePath();

    const geo = new THREE.ExtrudeGeometry(shape, { depth: width, bevelEnabled: false });
    geo.translate(0, 0, -halfW);
    const mesh = new THREE.Mesh(geo, Materials.concrete());
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    group.add(mesh);
  }

  // Coping along the spine ridge at the top center peak
  if (copingRadius > 0) {
    const cGeo = new THREE.CylinderGeometry(copingRadius, copingRadius, width, 12);
    cGeo.rotateX(Math.PI / 2);
    const cop = new THREE.Mesh(cGeo, Materials.coping());
    cop.position.set(0, height + copingRadius * 0.5, 0);
    cop.castShadow = true;
    group.add(cop);
  }

  return group;
}

function buildRail(params) {
  const { length=3, height=0.5, radius=0.03, style='round' } = params;
  const group = new THREE.Group();

  // Posts
  const postGeo = new THREE.CylinderGeometry(0.025, 0.025, height, 8);
  const postMat = Materials.metalDark();
  for (let i = 0; i <= 2; i++) {
    const post = new THREE.Mesh(postGeo, postMat);
    post.position.set(0, height/2, -length/2 + (length/2) * i);
    post.castShadow = true;
    group.add(post);
  }

  // Rail bar
  let railGeo;
  if (style === 'round') {
    railGeo = new THREE.CylinderGeometry(radius, radius, length, 12);
  } else {
    railGeo = new THREE.BoxGeometry(radius*2, radius*2, length);
  }
  railGeo.rotateX(Math.PI/2);
  const rail = new THREE.Mesh(railGeo, Materials.metal());
  rail.position.y = height;
  rail.castShadow = true;
  group.add(rail);

  // Base plates
  const plateGeo = new THREE.BoxGeometry(0.15, 0.02, 0.15);
  for (let i = 0; i <= 2; i++) {
    const plate = new THREE.Mesh(plateGeo, postMat);
    plate.position.set(0, 0.01, -length/2 + (length/2) * i);
    group.add(plate);
  }

  return group;
}

function buildKinkedRail(params) {
  const { length=4, height=0.8, radius=0.03, kinkAngle=20 } = params;
  const group = new THREE.Group();
  const postMat = Materials.metalDark();
  const railMat = Materials.metal();

  const segLen = length / 3;
  const drop = Math.tan(kinkAngle * Math.PI/180) * segLen;

  // Top flat segment
  const topGeo = new THREE.CylinderGeometry(radius, radius, segLen, 12);
  topGeo.rotateX(Math.PI/2);
  const topRail = new THREE.Mesh(topGeo, railMat);
  topRail.position.set(0, height, -length/2 + segLen/2);
  topRail.castShadow = true;
  group.add(topRail);

  // Kinked middle segment
  const midLen = Math.sqrt(segLen*segLen + drop*drop);
  const midGeo = new THREE.CylinderGeometry(radius, radius, midLen, 12);
  midGeo.rotateX(Math.PI/2);
  const midRail = new THREE.Mesh(midGeo, railMat);
  midRail.position.set(0, height - drop/2, 0);
  midRail.rotation.x = Math.atan2(drop, segLen);
  midRail.castShadow = true;
  group.add(midRail);

  // Bottom flat segment
  const botGeo = new THREE.CylinderGeometry(radius, radius, segLen, 12);
  botGeo.rotateX(Math.PI/2);
  const botRail = new THREE.Mesh(botGeo, railMat);
  botRail.position.set(0, height - drop, length/2 - segLen/2);
  botRail.castShadow = true;
  group.add(botRail);

  // Posts
  const positions = [
    [0, 0, -length/2], [0, 0, -segLen/2],
    [0, 0, segLen/2], [0, 0, length/2]
  ];
  const heights = [height, height, height - drop, height - drop];
  positions.forEach((p, i) => {
    const h = heights[i];
    const pGeo = new THREE.CylinderGeometry(0.02, 0.02, h, 8);
    const post = new THREE.Mesh(pGeo, postMat);
    post.position.set(p[0], h/2, p[2]);
    post.castShadow = true;
    group.add(post);
  });

  return group;
}

function buildHubba(params) {

  shape.lineTo(0, 0);

  const geo = new THREE.ExtrudeGeometry(shape, { depth: width, bevelEnabled: false });
  geo.translate(0, 0, -width/2);
  const mesh = new THREE.Mesh(geo, Materials.concrete());
  mesh.castShadow = true;

  group.add(cop);

}

function buildFunbox(params) {
  const { width=2.5, height=0.5, length=3, hasRails=true, hasLedge=true } = params;
  const group = new THREE.Group();

  // Main box
  const boxGeo = new THREE.BoxGeometry(width, height, length);
  const box = new THREE.Mesh(boxGeo, Materials.concrete());
  box.position.y = height / 2;
  box.castShadow = true;
  box.receiveShadow = true;
  group.add(box);

  // Bank on both ends
  for (let side = -1; side <= 1; side += 2) {
    const bankShape = new THREE.Shape();
    bankShape.moveTo(0, 0);
    bankShape.lineTo(0, height);
    bankShape.lineTo(side * 0.8, 0);
    bankShape.lineTo(0, 0);
    const bankGeo = new THREE.ExtrudeGeometry(bankShape, { depth: width, bevelEnabled: false });
    bankGeo.translate(0, 0, -width/2);
    const bank = new THREE.Mesh(bankGeo, Materials.concrete());
    bank.position.z = side * length / 2;
    bank.rotation.y = side > 0 ? 0 : Math.PI;
    bank.castShadow = true;
    bank.receiveShadow = true;
    group.add(bank);
  }

  // Edge coping
  const copGeo = new THREE.BoxGeometry(width + 0.02, 0.018, length + 0.02);
  const cop = new THREE.Mesh(copGeo, Materials.coping());
  cop.position.y = height + 0.009;
  group.add(cop);

  if (hasRails) {
    const rGeo = new THREE.CylinderGeometry(0.025, 0.025, length * 0.8, 8);
    rGeo.rotateX(Math.PI/2);
    for (let s = -1; s <= 1; s += 2) {
      const r = new THREE.Mesh(rGeo, Materials.metal());
      r.position.set(s * (width/2 + 0.05), height + 0.35, 0);
      r.castShadow = true;
      group.add(r);
    }
  }

  return group;
}

function buildPyramid(params) {
  const { baseSize=3, height=0.6 } = params;
  const group = new THREE.Group();

  // Truncated pyramid using CylinderGeometry (4 sides, rotated 45° to align with axes)
  const topSize = baseSize * 0.4;
  const topRadius = topSize / 2 * Math.SQRT2;   // circumradius for square
  const botRadius = baseSize / 2 * Math.SQRT2;  // circumradius for square
  const geo = new THREE.CylinderGeometry(topRadius, botRadius, height, 4, 1);
  geo.rotateY(Math.PI / 4); // align edges with X/Z axes
  geo.translate(0, height / 2, 0); // sit on ground

  const mesh = new THREE.Mesh(geo, Materials.concrete());
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  group.add(mesh);

  // Edge copings along top edges
  const copMat = Materials.coping();
  const ts = topSize / 2;
  // Four edges on top: front, back, left, right
  const copGeoX = new THREE.BoxGeometry(topSize + 0.04, 0.02, 0.035);
  const copGeoZ = new THREE.BoxGeometry(0.035, 0.02, topSize + 0.04);
  
  const copFront = new THREE.Mesh(copGeoX, copMat);
  copFront.position.set(0, height + 0.01, -ts);
  group.add(copFront);

  const copBack = new THREE.Mesh(copGeoX, copMat);
  copBack.position.set(0, height + 0.01, ts);
  group.add(copBack);

  const copLeft = new THREE.Mesh(copGeoZ, copMat);
  copLeft.position.set(-ts, height + 0.01, 0);
  group.add(copLeft);

  const copRight = new THREE.Mesh(copGeoZ, copMat);
  copRight.position.set(ts, height + 0.01, 0);
  group.add(copRight);

  return group;
}
