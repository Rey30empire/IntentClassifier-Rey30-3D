function buildPicnicTable(params) {
  const { length=1.8, width=1.4, height=0.75 } = params;
  const group = new THREE.Group();
  const wood = Materials.wood ? Materials.wood() : new THREE.MeshStandardMaterial({ color: 0x8B5A2B, roughness: 0.85, metalness: 0.0 });

  const plankH = 0.035;
  const plankW = 0.12;
  const plankGap = 0.01;
  const tableTopW = plankW * 4 + plankGap * 3; // 4 planks for tabletop
  const seatH = height * 0.52;
  const seatSpread = tableTopW / 2 + 0.25; // distance from center to seat center
  const legInset = length * 0.22;
  const legThick = 0.06;
  const legAngle = 0.3; // radians outward tilt

  // Tabletop — 4 planks
  for (let i = 0; i < 4; i++) {
    const plank = new THREE.Mesh(
      new THREE.BoxGeometry(length, plankH, plankW),
      wood.clone()
    );
    const zOff = (i - 1.5) * (plankW + plankGap);
    plank.position.set(0, height, zOff);
    plank.castShadow = true;
    plank.receiveShadow = true;
    group.add(plank);
  }

  // Seat benches — 2 planks each side
  for (let side = -1; side <= 1; side += 2) {
    for (let i = 0; i < 2; i++) {
      const seat = new THREE.Mesh(
        new THREE.BoxGeometry(length, plankH, plankW),
        wood.clone()
      );
      seat.position.set(0, seatH, side * seatSpread + (i - 0.5) * (plankW + plankGap));
      seat.castShadow = true;
      seat.receiveShadow = true;
      group.add(seat);
    }
  }

  // A-frame legs — 2 sets at each end
  for (let xSide = -1; xSide <= 1; xSide += 2) {
    const xPos = xSide * (length / 2 - legInset);

    for (let zSide = -1; zSide <= 1; zSide += 2) {
      // Each leg goes from ground (y=0) up to tabletop height, angled outward
      // The leg tilts in Z so bottom is wider apart than top
      const legLen = height / Math.cos(legAngle) + 0.02;
      const leg = new THREE.Mesh(
        new THREE.BoxGeometry(legThick, legLen, legThick),
        wood.clone()
      );
      // Position: center the leg vertically, then tilt outward
      leg.position.set(xPos, height / 2, zSide * (tableTopW / 2) * 0.3);
      leg.rotation.x = zSide * legAngle;
      leg.castShadow = true;
      group.add(leg);
    }

    // Horizontal cross brace connecting the two legs at ~40% height
    const brace = new THREE.Mesh(
      new THREE.BoxGeometry(legThick, legThick, width * 0.7),
      wood.clone()
    );
    brace.position.set(xPos, height * 0.32, 0);
    brace.castShadow = true;
    group.add(brace);

    // Seat support brackets — short horizontal pieces under each seat
    for (let zSide = -1; zSide <= 1; zSide += 2) {
      const bracket = new THREE.Mesh(
        new THREE.BoxGeometry(legThick, legThick, plankW * 2.5),
        wood.clone()
      );
      bracket.position.set(xPos, seatH - plankH / 2 - legThick / 2, zSide * seatSpread);
      bracket.castShadow = true;
      group.add(bracket);
    }
  }

  // Long center beam running the length under the tabletop
  const centerBeam = new THREE.Mesh(
    new THREE.BoxGeometry(length * 0.7, legThick, legThick),
    wood.clone()
  );
  centerBeam.position.set(0, height - plankH / 2 - legThick / 2 - 0.01, 0);
  centerBeam.castShadow = true;
  group.add(centerBeam);

  return group;
}

function buildBowl(params) {
  const { radius=4, depth=2.4, copingRadius=0.04 } = params;
  const group = new THREE.Group();

  const segsR = 56, segsD = 20;

  // Build bowl interior as an inward-facing hemisphere shell
  const geometry = new THREE.BufferGeometry();
  const verts = [], idxs = [], norms = [], uvs = [];

  for (let j = 0; j <= segsD; j++) {
    const t = j / segsD;
    const angle = (Math.PI / 2) * t;
    const r = radius * Math.sin(angle);
    const y = -depth * Math.cos(angle);
    for (let i = 0; i <= segsR; i++) {
      const theta = (i / segsR) * Math.PI * 2;
      verts.push(r * Math.cos(theta), y, r * Math.sin(theta));
      const nx = Math.sin(angle) * Math.cos(theta);
      const ny = Math.cos(angle);
      const nz = Math.sin(angle) * Math.sin(theta);
      norms.push(-nx, -ny, -nz);
      uvs.push(i / segsR * 3, j / segsD * 3);
    }
  }

  for (let j = 0; j < segsD; j++) {
    for (let i = 0; i < segsR; i++) {
      const a = j * (segsR + 1) + i;
      const b = a + segsR + 1;
      idxs.push(a, a + 1, b, b, a + 1, b + 1);
    }
  }

  geometry.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
  geometry.setAttribute('normal', new THREE.Float32BufferAttribute(norms, 3));
  geometry.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
  geometry.setIndex(idxs);

  const bowlMat = Materials.concreteWorn();
  bowlMat.side = THREE.DoubleSide;
  const mesh = new THREE.Mesh(geometry, bowlMat);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  group.add(mesh);

  // Stencil mask disc at ground level
  const maskGeo = new THREE.CircleGeometry(radius + 0.01, segsR);
  maskGeo.rotateX(-Math.PI / 2);
  const maskMat = new THREE.MeshBasicMaterial({
    colorWrite: false, depthWrite: true,
    stencilWrite: true, stencilRef: 1,
    stencilFunc: THREE.AlwaysStencilFunc,
    stencilFail: THREE.KeepStencilOp,
    stencilZFail: THREE.KeepStencilOp,
    stencilZPass: THREE.ReplaceStencilOp
  });
  const mask = new THREE.Mesh(maskGeo, maskMat);
  mask.position.y = 0.005;
  mask.renderOrder = 0;
  group.add(mask);

  // Weathered concrete rim/deck around the bowl lip
  const rimWidth = 0.5;
  const rimThickness = 0.18;
  const rimGeo = new THREE.RingGeometry(radius - 0.02, radius + rimWidth, segsR);
  rimGeo.rotateX(-Math.PI / 2);
  const rimMat = Materials.concrete();
  rimMat.stencilWrite = true;
  rimMat.stencilRef = 0;
  rimMat.stencilFunc = THREE.AlwaysStencilFunc;
  rimMat.stencilZPass = THREE.ReplaceStencilOp;
  const rim = new THREE.Mesh(rimGeo, rimMat);
  rim.position.y = 0.01;
  rim.renderOrder = 3;
  rim.receiveShadow = true;
  group.add(rim);

  // Rim side (vertical edge)
  const rimSideGeo = new THREE.CylinderGeometry(radius + rimWidth, radius + rimWidth, rimThickness, segsR, 1, true);
  const rimSideMat = Materials.concreteDark();
  const rimSide = new THREE.Mesh(rimSideGeo, rimSideMat);
  rimSide.position.y = -rimThickness / 2 + 0.01;
  rimSide.receiveShadow = true;
  rimSide.castShadow = true;
  group.add(rimSide);

  // Pool coping — thicker, more visible
  if (copingRadius > 0) {
    const cr = Math.max(copingRadius, 0.05);
    const copGeo = new THREE.TorusGeometry(radius, cr, 12, segsR);
    copGeo.rotateX(Math.PI / 2);
    const cop = new THREE.Mesh(copGeo, Materials.coping());
    cop.position.y = cr * 0.25;
    cop.castShadow = true;
    group.add(cop);
  }

  // Drain detail at bowl bottom
  const drainGeo = new THREE.CylinderGeometry(0.06, 0.06, 0.02, 12);
  const drainMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.5, metalness: 0.8 });
  const drain = new THREE.Mesh(drainGeo, drainMat);
  drain.position.y = -depth + 0.01;
  group.add(drain);
  const drainCover = new THREE.TorusGeometry(0.05, 0.005, 4, 8);
  drainCover.rotateX(Math.PI / 2);
  const dCover = new THREE.Mesh(drainCover, drainMat);
  dCover.position.y = -depth + 0.025;
  group.add(dCover);

  return group;
}

function buildKidneyPool(params) {
  const { length=6, width=3.5, depth=2.2, copingRadius=0.04 } = params;
  const group = new THREE.Group();

  const segsR = 56, segsD = 18;
  const geometry = new THREE.BufferGeometry();
  const verts = [], idxs = [], norms = [], uvs = [];

  const r1 = width * 0.55, r2 = width * 0.4;
  const offset = length * 0.22;

  function kidneyRadius(theta) {
    const x1 = r1 * Math.cos(theta) - offset;
    const z1 = r1 * Math.sin(theta);
    const x2 = r2 * Math.cos(theta) + offset;
    const z2 = r2 * Math.sin(theta);
    const blend = (Math.cos(theta) + 1) / 2;
    return Math.sqrt(Math.pow(x1 * blend + x2 * (1-blend), 2) + Math.pow(z1 * blend + z2 * (1-blend), 2));
  }

  for (let j = 0; j <= segsD; j++) {
    const t = j / segsD;
    const depthAngle = (Math.PI / 2) * t;
    const depthFactor = Math.sin(depthAngle);
    const y = -depth * Math.cos(depthAngle);

    for (let i = 0; i <= segsR; i++) {
      const theta = (i / segsR) * Math.PI * 2;
      const kr = kidneyRadius(theta);
      const r = kr * depthFactor;
      verts.push(r * Math.cos(theta), y, r * Math.sin(theta));
      norms.push(-Math.sin(depthAngle) * Math.cos(theta), -Math.cos(depthAngle), -Math.sin(depthAngle) * Math.sin(theta));
      uvs.push(i / segsR * 3, j / segsD * 3);
    }
  }

  for (let j = 0; j < segsD; j++) {
    for (let i = 0; i < segsR; i++) {
      const a = j * (segsR + 1) + i;
      const b = a + segsR + 1;
      idxs.push(a, a + 1, b, b, a + 1, b + 1);
    }
  }

  geometry.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
  geometry.setAttribute('normal', new THREE.Float32BufferAttribute(norms, 3));
  geometry.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
  geometry.setIndex(idxs);
  geometry.computeVertexNormals();

  const bowlMat = Materials.concreteWorn();
  bowlMat.side = THREE.DoubleSide;
  const mesh = new THREE.Mesh(geometry, bowlMat);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  group.add(mesh);

  // Stencil mask
  const maskShape = new THREE.Shape();
  for (let i = 0; i <= 64; i++) {
    const theta = (i / 64) * Math.PI * 2;
    const kr = kidneyRadius(theta);
    const x = kr * Math.cos(theta);
    const z = kr * Math.sin(theta);
    if (i === 0) maskShape.moveTo(x, z);
    else maskShape.lineTo(x, z);
  }
  const maskGeo = new THREE.ShapeGeometry(maskShape, 64);
  maskGeo.rotateX(-Math.PI / 2);
  const maskMat = new THREE.MeshBasicMaterial({
    colorWrite: false, depthWrite: true,
    stencilWrite: true, stencilRef: 1,
    stencilFunc: THREE.AlwaysStencilFunc,
    stencilFail: THREE.KeepStencilOp,
    stencilZFail: THREE.KeepStencilOp,
    stencilZPass: THREE.ReplaceStencilOp
  });
  const mask = new THREE.Mesh(maskGeo, maskMat);
  mask.position.y = 0.005;
  mask.renderOrder = 0;
  group.add(mask);

  // Weathered concrete rim/deck
  const rimWidth = 0.5;
  const outerShape = new THREE.Shape();
  const innerShape = new THREE.Path();
  for (let i = 0; i <= 64; i++) {
    const theta = (i / 64) * Math.PI * 2;
    const kr = kidneyRadius(theta);
    const ox = (kr + rimWidth) * Math.cos(theta);
    const oz = (kr + rimWidth) * Math.sin(theta);
    const ix = (kr - 0.02) * Math.cos(theta);
    const iz = (kr - 0.02) * Math.sin(theta);
    if (i === 0) {
      outerShape.moveTo(ox, oz);
      innerShape.moveTo(ix, iz);
    } else {
      outerShape.lineTo(ox, oz);
      innerShape.lineTo(ix, iz);
    }
  }
  outerShape.holes.push(innerShape);
  const rimGeo = new THREE.ShapeGeometry(outerShape, 64);
  rimGeo.rotateX(-Math.PI / 2);
  const rimMat = Materials.concrete();
  rimMat.stencilWrite = true;
  rimMat.stencilRef = 0;
  rimMat.stencilFunc = THREE.AlwaysStencilFunc;
  rimMat.stencilZPass = THREE.ReplaceStencilOp;
  const rim = new THREE.Mesh(rimGeo, rimMat);
  rim.position.y = 0.01;
  rim.renderOrder = 3;
  rim.receiveShadow = true;
  group.add(rim);

  // Pool coping — thicker
  if (copingRadius > 0) {
    const cr = Math.max(copingRadius, 0.05);
    const points = [];
    for (let i = 0; i <= segsR; i++) {
      const theta = (i / segsR) * Math.PI * 2;
      const kr = kidneyRadius(theta);
      points.push(new THREE.Vector3(kr * Math.cos(theta), cr * 0.25, kr * Math.sin(theta)));
    }
    const curve = new THREE.CatmullRomCurve3(points, true);
    const tubeGeo = new THREE.TubeGeometry(curve, 64, cr, 12, true);
    const cop = new THREE.Mesh(tubeGeo, Materials.coping());
    cop.castShadow = true;
    group.add(cop);
  }

  // Drain at bottom
  const drainMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.5, metalness: 0.8 });
  const drainGeo = new THREE.CylinderGeometry(0.06, 0.06, 0.02, 12);
  const drain = new THREE.Mesh(drainGeo, drainMat);
  drain.position.y = -depth + 0.01;
  group.add(drain);

  return group;
}

function buildCradle(params) {
  const { width=3, height=3, depth=2 } = params;
  const group = new THREE.Group();

  const segs = 16;
  const shape = new THREE.Shape();
  shape.moveTo(0, 0);
  for (let i = 0; i <= segs; i++) {
    const a = Math.PI * (i / segs);
    shape.lineTo(Math.sin(a) * depth, (1 - Math.cos(a)) * height / 2 + (i / segs) * height / 2);
  }
  shape.lineTo(0, height);
  shape.lineTo(-depth, height);
  shape.lineTo(-depth, 0);
  shape.lineTo(0, 0);

  const geo = new THREE.ExtrudeGeometry(shape, { depth: width, bevelEnabled: false });
  geo.translate(0, 0, -width/2);
  const mesh = new THREE.Mesh(geo, Materials.concrete());
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  group.add(mesh);

  return group;
}

function buildFlatGround(params) {
  const { width=6, length=8, material='concrete' } = params;
  const group = new THREE.Group();

  const geo = new THREE.BoxGeometry(width, 0.12, length);
  const matFn = Materials[material] || Materials.concrete;
  const mesh = new THREE.Mesh(geo, matFn());
  mesh.position.y = 0.06;
  mesh.receiveShadow = true;
  mesh.castShadow = true;
  group.add(mesh);

  return group;
}

function buildGap(params) {
  const { width=3, gapWidth=1.5, platformHeight=0.3 } = params;
  const group = new THREE.Group();

  for (let s = -1; s <= 1; s += 2) {
    const geo = new THREE.BoxGeometry(width, platformHeight, 1.5);
    const mesh = new THREE.Mesh(geo, Materials.concrete());
    mesh.position.set(0, platformHeight/2, s * (gapWidth/2 + 0.75));
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    group.add(mesh);
  }

  return group;
}

function buildEuroGap(params) {
  const { width=3, height=0.25, length=4 } = params;
  const group = new THREE.Group();

  // Higher platform
  const hiGeo = new THREE.BoxGeometry(width, height, length/2);
  const hi = new THREE.Mesh(hiGeo, Materials.concrete());
  hi.position.set(0, height/2, -length/4);
  hi.castShadow = true;
  hi.receiveShadow = true;
  group.add(hi);

  // Lower platform
  const loGeo = new THREE.BoxGeometry(width, 0.1, length/2);
  const lo = new THREE.Mesh(loGeo, Materials.concrete());
  lo.position.set(0, 0.05, length/4);
  lo.receiveShadow = true;
  group.add(lo);

  return group;
}

function buildHip(params) {
  const { width=3, height=1, angle=90 } = params;
  const group = new THREE.Group();

  const rad = angle * Math.PI / 180;
  for (let s = 0; s < 2; s++) {
    const shape = new THREE.Shape();
    shape.moveTo(0, 0);
    shape.lineTo(width, 0);
    shape.lineTo(0, height);
    shape.lineTo(0, 0);

    const geo = new THREE.ExtrudeGeometry(shape, { depth: 0.15, bevelEnabled: false });
    const mesh = new THREE.Mesh(geo, Materials.concrete());
    mesh.rotation.y = s * rad;
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    group.add(mesh);
  }

  return group;
}

// ===== ADD OBJECT TO SCENE =====
function findComponentDef(typeId) {
  for (const cat of Object.values(COMPONENTS)) {
    for (const item of cat.items) {
      if (item.id === typeId) return item;
    }
  }
  return null;
}

function addParkObject(typeId, position, rotation, customParams) {
  const def = findComponentDef(typeId);
  if (!def) return null;

  const params = { ...def.params, ...(customParams || {}) };
  const group = def.build(params);

  group.userData = {
    id: objectIdCounter++,
    type: typeId,
    name: def.name + ' ' + objectIdCounter,
    params: { ...params },
    icon: def.icon
  };

  if (position) group.position.set(position[0], position[1], position[2]);
  if (rotation) group.rotation.set(rotation[0], rotation[1], rotation[2]);

  scene.add(group);
  parkObjects.push(group);
  updateObjectCount();
  return group;
}

function removeObject(obj) {
  if (!obj) return;
  if (selectedObject === obj) deselectObject();
  scene.remove(obj);
  parkObjects = parkObjects.filter(o => o !== obj);
  obj.traverse(child => {
    if (child.geometry) child.geometry.dispose();
    if (child.material) {
      if (Array.isArray(child.material)) child.material.forEach(m => m.dispose());
      else child.material.dispose();
    }
  });
  updateObjectCount();
}

function rebuildObject(obj) {
  const ud = obj.userData;
  const def = findComponentDef(ud.type);
  if (!def) return;

  // Remove old children
  while (obj.children.length) {
    const c = obj.children[0];
    obj.remove(c);
    if (c.geometry) c.geometry.dispose();
    if (c.material) {
      if (Array.isArray(c.material)) c.material.forEach(m => m.dispose());
      else c.material.dispose();
    }
  }

  // Rebuild
  const newGroup = def.build(ud.params);
  while (newGroup.children.length) {
    const c = newGroup.children[0];
    newGroup.remove(c);
    obj.add(c);
  }
}

// ===== SELECTION =====
function selectObject(obj) {
  if (selectedObject === obj) return;
  deselectObject();
  selectedObject = obj;
  transformControls.attach(obj);
  updateInspector();
  updateHierarchy();
}

function deselectObject() {
  selectedObject = null;
  transformControls.detach();
  updateInspector();
  updateHierarchy();
}

// ===== RAYCASTING =====
function onPointerDown(event) {
  if (event.button === 2) return;
  if (transformControls.dragging) return;

  const rect = renderer.domElement.getBoundingClientRect();
  mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);

  const meshes = [];
  parkObjects.forEach(obj => {
    obj.traverse(child => {
      if (child.isMesh) {
        child.userData._parkParent = obj;
        meshes.push(child);
      }
    });
  });

  const hits = raycaster.intersectObjects(meshes);
  if (hits.length > 0) {
    const hit = hits[0].object;
    const parent = hit.userData._parkParent;
    if (parent) selectObject(parent);
  } else {
    deselectObject();
  }
}

function onPointerMove(event) {
  const rect = renderer.domElement.getBoundingClientRect();
  mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects([ground]);
  if (hits.length > 0) {
    const p = hits[0].point;
    document.getElementById('cursor-pos').textContent = `X: ${p.x.toFixed(1)}  Y: ${p.y.toFixed(1)}  Z: ${p.z.toFixed(1)}`;
  }
}

// ===== CONTEXT MENU =====
function onContextMenu(event) {
  event.preventDefault();
  if (!selectedObject) return;
  const menu = document.getElementById('context-menu');
  menu.style.display = 'block';
  menu.style.left = event.clientX + 'px';
  menu.style.top = event.clientY + 'px';
}

function initContextMenu() {
  document.addEventListener('click', () => {
    document.getElementById('context-menu').style.display = 'none';
  });

  document.querySelectorAll('#context-menu .cm-item').forEach(item => {
    item.addEventListener('click', () => {
      const action = item.dataset.action;
      if (!selectedObject && action !== 'delete') return;
      switch (action) {
        case 'duplicate': duplicateSelected(); break;
        case 'mirror': mirrorSelected(); break;
        case 'group': toast('Group created'); break;
        case 'focus': focusSelected(); break;
        case 'reset': resetTransform(); break;
        case 'delete': deleteSelected(); break;
      }
    });
  });
}

// ===== ACTIONS =====
function duplicateSelected() {
  if (!selectedObject) return;
  pushUndo('add');
  const ud = selectedObject.userData;
  const obj = addParkObject(ud.type, null, null, ud.params);
  if (obj) {
    obj.position.copy(selectedObject.position);
    obj.rotation.copy(selectedObject.rotation);
    obj.scale.copy(selectedObject.scale);
    selectObject(obj);
    toast('Duplicated');
  }
}

function mirrorSelected() {
  if (!selectedObject) return;
  pushUndo('transform');
  selectedObject.scale.x *= -1;
  updateInspector();
  toast('Mirrored');
}

function focusSelected() {
  if (!selectedObject) return;
  const pos = selectedObject.position.clone();
  orbitControls.target.copy(pos);
  camera.position.set(pos.x + 5, pos.y + 4, pos.z + 5);
}

function resetTransform() {
  if (!selectedObject) return;
  pushUndo('transform');
  selectedObject.rotation.set(0, 0, 0);
  selectedObject.scale.set(1, 1, 1);
  updateInspector();
  toast('Transform reset');
}

function deleteSelected() {
  if (!selectedObject) return;
  pushUndo('delete');
  removeObject(selectedObject);
  updateHierarchy();
  toast('Deleted');
}

// ===== UNDO/REDO =====
function getSceneState() {
  return parkObjects.map(obj => ({
    type: obj.userData.type,
    name: obj.userData.name,
    params: { ...obj.userData.params },
    position: [obj.position.x, obj.position.y, obj.position.z],
    rotation: [obj.rotation.x, obj.rotation.y, obj.rotation.z],
    scale: [obj.scale.x, obj.scale.y, obj.scale.z]
  }));
}

function restoreSceneState(state) {
  while (parkObjects.length) removeObject(parkObjects[0]);
  state.forEach(s => {
    const obj = addParkObject(s.type, s.position, s.rotation, s.params);
    if (obj) {
      obj.userData.name = s.name;
      obj.scale.set(s.scale[0], s.scale[1], s.scale[2]);
    }
  });
  deselectObject();
  updateHierarchy();
}

function pushUndo(action) {
  undoStack.push(getSceneState());
  if (undoStack.length > 50) undoStack.shift();
  redoStack = [];
}

function undo() {
  if (undoStack.length === 0) return;
  redoStack.push(getSceneState());
  restoreSceneState(undoStack.pop());
  toast('Undo');
}

function redo() {
  if (redoStack.length === 0) return;
  undoStack.push(getSceneState());
  restoreSceneState(redoStack.pop());
  toast('Redo');
}

// ===== SAVE/LOAD/EXPORT =====
function savePark() {
  const data = {
    version: '1.0',
    name: 'My Skatepark',
    objects: getSceneState(),
    environment: envSettings,
    camera: {
      position: [camera.position.x, camera.position.y, camera.position.z],
      target: [orbitControls.target.x, orbitControls.target.y, orbitControls.target.z]
    }
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'skatepark.json';
  a.click();
  URL.revokeObjectURL(url);
  toast('Park saved!');
}

function loadPark() {
  document.getElementById('file-input').click();
}

document.getElementById('file-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      pushUndo('load');
      while (parkObjects.length) removeObject(parkObjects[0]);
      if (data.objects) {
        data.objects.forEach(s => {
          const obj = addParkObject(s.type, s.position, s.rotation, s.params);
          if (obj && s.scale) obj.scale.set(s.scale[0], s.scale[1], s.scale[2]);
          if (obj && s.name) obj.userData.name = s.name;
        });
      }
      if (data.environment) {
        envSettings = { ...envSettings, ...data.environment };
        applyEnvironment();
      }
      toast('Park loaded!');
    } catch (err) {
      toast('Error loading file');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
});

async function exportPark() {
  if (parkObjects.length === 0) { toast('Add objects first'); return; }

  // Detach transform gizmo so it doesn't get exported
  const wasAttached = transformControls.object;
  transformControls.detach();

  const exporter = new GLTFExporter();

  try {
    const result = await new Promise((resolve, reject) => {
      exporter.parse(
        scene,
        (res) => resolve(res),
        (err) => reject(err),
        { binary: true, onlyVisible: true }
      );
    });

    const blob = new Blob([result], { type: 'model/gltf-binary' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.style.display = 'none';
    a.href = url;
    a.download = 'skatepark.glb';
    document.body.appendChild(a);
    a.click();
    setTimeout(() => {
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }, 300);
    const sizeKB = (blob.size / 1024).toFixed(0);
    toast('Exported skatepark.glb (' + sizeKB + ' KB)');
  } catch (err) {
    console.error('GLB export error:', err);
    toast('Export failed: ' + (err.message || err));
  }

  // Re-attach transform gizmo if something was selected
  if (wasAttached) transformControls.attach(wasAttached);
}

function takeScreenshot() {
  renderer.render(scene, camera);
  const url = renderer.domElement.toDataURL('image/png');
  const a = document.createElement('a');
  a.href = url;
  a.download = 'skatepark_screenshot.png';
  a.click();
  toast('Screenshot saved!');
}

// ===== FLYTHROUGH =====
let flyData = null;

function startFlythrough() {
  if (parkObjects.length === 0) { toast('Add objects first'); return; }
  flyMode = true;
  document.getElementById('flythrough-overlay').style.display = 'block';
  orbitControls.enabled = false;
  transformControls.detach();

  // Create a simple path through objects
  const points = parkObjects.map(o => o.position.clone().add(new THREE.Vector3(0, 3, 0)));
  points.unshift(camera.position.clone());
  // Add some intermediate points for smoothness
  const allPts = [];
  points.forEach((p, i) => {
    allPts.push(p);
    if (i < points.length - 1) {
      const mid = p.clone().lerp(points[i+1], 0.5).add(new THREE.Vector3(0, 1, 0));
      allPts.push(mid);
    }
  });
  allPts.push(points[0]);

  const curve = new THREE.CatmullRomCurve3(allPts, true);
  flyData = { curve, t: 0, speed: 0.0003 };
}

function stopFlythrough() {
  flyMode = false;
  flyData = null;
  document.getElementById('flythrough-overlay').style.display = 'none';
  orbitControls.enabled = true;
}

// ===== KEYBOARD =====
function onKeyDown(e) {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;

  if (e.key === 'Escape') {
    if (flyMode) stopFlythrough();
    else deselectObject();
  }
  if (e.key === 'Delete' || e.key === 'Backspace') deleteSelected();
  if (e.key === 'w' || e.key === 'W' || e.key === 'm' || e.key === 'M') setGizmoMode('translate');
  if (e.key === 'e' || e.key === 'E' || e.key === 'r' || e.key === 'R') setGizmoMode('rotate');
  if (e.key === 's' || e.key === 'S') setGizmoMode('scale');
  if (e.key === 'd' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); duplicateSelected(); }
  if (e.key === 'z' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); if (e.shiftKey) redo(); else undo(); }
  if (e.key === 'y' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); redo(); }
  if (e.key === 'f') focusSelected();
  if (e.key === 'g') toggleSnap();
}

// ===== GIZMO =====
function setGizmoMode(mode) {
  gizmoMode = mode;
  transformControls.setMode(mode);
  if (mode === 'translate') transformControls.setTranslationSnap(snapEnabled ? snapSize : null);
  else if (mode === 'rotate') transformControls.setRotationSnap(snapEnabled ? Math.PI / 12 : null);
  else transformControls.setScaleSnap(snapEnabled ? 0.1 : null);

  document.querySelectorAll('#gizmo-modes .gm').forEach(g => {
    g.classList.toggle('active', g.dataset.mode === mode);
  });

  // Sync mobile nav
  const mobileMap = { translate: 'move', rotate: 'rotate', scale: 'scale' };
  if (mobileMap[mode]) updateMobileNavActive(mobileMap[mode]);
}

function toggleSnap() {
  snapEnabled = !snapEnabled;
  document.getElementById('btn-snap').classList.toggle('active', snapEnabled);
  const dot = document.querySelector('#snap-indicator .dot');
  dot.style.background = snapEnabled ? 'var(--accent)' : '#555';
  setGizmoMode(gizmoMode);
}

// ===== ENVIRONMENT =====
function applyEnvironment() {
  const { time } = envSettings;
  if (time === 'day') {
    scene.background = new THREE.Color(0x87CEEB);
    scene.fog = new THREE.FogExp2(0x87CEEB, 0.008);
    dirLight.intensity = 1.2;
    dirLight.color.set(0xffffff);
    dirLight.position.set(15, 20, 10);
    ambLight.intensity = 0.4;
    hemiLight.intensity = 0.5;
    hemiLight.color.set(0x87CEEB);
    renderer.toneMappingExposure = 1.1;
  } else if (time === 'sunset') {
    scene.background = new THREE.Color(0xff8844);
    scene.fog = new THREE.FogExp2(0xff8844, 0.01);
    dirLight.intensity = 1.0;
    dirLight.color.set(0xffaa55);
    dirLight.position.set(5, 8, 15);
    ambLight.intensity = 0.3;
    hemiLight.intensity = 0.4;
    hemiLight.color.set(0xff8844);
    renderer.toneMappingExposure = 0.9;
  } else if (time === 'night') {
    scene.background = new THREE.Color(0x0a0a1e);
    scene.fog = new THREE.FogExp2(0x0a0a1e, 0.015);
    dirLight.intensity = 0.3;
    dirLight.color.set(0x4466aa);
    dirLight.position.set(10, 15, 5);
    ambLight.intensity = 0.15;
    hemiLight.intensity = 0.1;
    hemiLight.color.set(0x111133);
    renderer.toneMappingExposure = 0.6;
  } else if (time === 'overcast') {
    scene.background = new THREE.Color(0x999999);
    scene.fog = new THREE.FogExp2(0x999999, 0.01);
    dirLight.intensity = 0.6;
    dirLight.color.set(0xcccccc);
    ambLight.intensity = 0.55;
    hemiLight.intensity = 0.5;
    hemiLight.color.set(0xaaaaaa);
    renderer.toneMappingExposure = 0.95;
  }
}

// ===== UI =====
function initSidebar() {
  document.querySelectorAll('.stab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.stab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      renderSidebarContent(tab.dataset.tab);
    });
  });
  renderSidebarContent('components');
}

function renderSidebarContent(tab) {
  const el = document.getElementById('sidebar-content');
  if (tab === 'components') {
    let html = '<input class="search-box" placeholder="Search components..." id="comp-search">';
    for (const [catKey, cat] of Object.entries(COMPONENTS)) {
      html += `<div class="cat-label">${cat.label} <span>${cat.items.length}</span></div>`;
      html += '<div class="comp-grid">';
      cat.items.forEach(item => {
        html += `<div class="comp-item" data-type="${item.id}" draggable="true">
          <span class="ci-icon">${item.icon}</span>
          <div class="ci-name">${item.name}</div>
          <div class="ci-tag">${item.tag}</div>
        </div>`;
      });
      html += '</div>';
    }
    el.innerHTML = html;

    // Drag and drop + click to add
    el.querySelectorAll('.comp-item').forEach(item => {
      item.addEventListener('click', () => {
        pushUndo('add');
        const obj = addParkObject(item.dataset.type, [0, 0, 0]);
        if (obj) {
          selectObject(obj);
          toast(`Added ${obj.userData.name}`);
        }
      });

      item.addEventListener('dragstart', e => {
        e.dataTransfer.setData('text/plain', item.dataset.type);
      });
    });

    // Drop on viewport
    const vp = document.getElementById('viewport');
    vp.addEventListener('dragover', e => e.preventDefault());
    vp.addEventListener('drop', e => {
      e.preventDefault();
      const type = e.dataTransfer.getData('text/plain');
      if (!type) return;

      const rect = vp.getBoundingClientRect();
      mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      const hits = raycaster.intersectObjects([ground]);
      let pos = [0, 0, 0];
      if (hits.length > 0) {
        const p = hits[0].point;
        if (snapEnabled) {
          pos = [Math.round(p.x / snapSize) * snapSize, 0, Math.round(p.z / snapSize) * snapSize];
        } else {
          pos = [p.x, 0, p.z];
        }
      }
      pushUndo('add');
      const obj = addParkObject(type, pos);
      if (obj) {
        selectObject(obj);
        toast(`Placed ${obj.userData.name}`);
      }
    });

    // Search
    document.getElementById('comp-search').addEventListener('input', e => {
      const q = e.target.value.toLowerCase();
      el.querySelectorAll('.comp-item').forEach(item => {
        const name = item.querySelector('.ci-name').textContent.toLowerCase();
        item.style.display = name.includes(q) ? '' : 'none';
      });
    });

  } else if (tab === 'templates') {
    let html = '<div style="padding:4px">';
    TEMPLATES.forEach(t => {
      html += `<div class="template-card" data-template="${t.id}">
        <h4>${t.name}</h4>
        <p>${t.desc}</p>
      </div>`;
    });
    html += '</div>';
    el.innerHTML = html;

    el.querySelectorAll('.template-card').forEach(card => {
      card.addEventListener('click', () => {
        const tmpl = TEMPLATES.find(t => t.id === card.dataset.template);
        if (!tmpl) return;
        pushUndo('template');
        while (parkObjects.length) removeObject(parkObjects[0]);
        tmpl.objects.forEach(o => {
          addParkObject(o.type, o.pos, o.rot, o.params);
        });
        deselectObject();
        toast(`Loaded: ${tmpl.name}`);
        showOverlay(`🛹 ${tmpl.name}`);
      });
    });

  } else if (tab === 'environ') {
    let html = `
      <div class="insp-section">
        <div class="insp-section-title">☀ Time of Day</div>
        <div class="env-row">
          <div class="env-btn ${envSettings.time==='day'?'active':''}" data-time="day">☀ Day</div>
          <div class="env-btn ${envSettings.time==='sunset'?'active':''}" data-time="sunset">🌅 Sunset</div>
        </div>
        <div class="env-row">
          <div class="env-btn ${envSettings.time==='night'?'active':''}" data-time="night">🌙 Night</div>
          <div class="env-btn ${envSettings.time==='overcast'?'active':''}" data-time="overcast">☁ Overcast</div>
        </div>
      </div>
      <div class="insp-section">
        <div class="insp-section-title">💡 Lighting</div>
        <div class="slider-row">
          <label>Sun</label>
          <input type="range" min="0" max="2" step="0.1" value="${dirLight.intensity}" id="env-sun">
          <span class="val" id="env-sun-val">${dirLight.intensity.toFixed(1)}</span>
        </div>
        <div class="slider-row">
          <label>Ambient</label>
          <input type="range" min="0" max="1" step="0.05" value="${ambLight.intensity}" id="env-amb">
          <span class="val" id="env-amb-val">${ambLight.intensity.toFixed(2)}</span>
        </div>
        <div class="slider-row">
          <label>Exposure</label>
          <input type="range" min="0.2" max="2" step="0.05" value="${renderer.toneMappingExposure}" id="env-exp">
          <span class="val" id="env-exp-val">${renderer.toneMappingExposure.toFixed(2)}</span>
        </div>
      </div>
      <div class="insp-section">
        <div class="insp-section-title">🌍 Ground</div>
        <div class="insp-row">
          <label>Color</label>
          <input type="color" value="#4a7a3a" id="env-ground-color">
        </div>
      </div>
      <div class="insp-section">
        <div class="insp-section-title">🔲 Grid</div>
        <div class="slider-row">
          <label>Snap Size</label>
          <input type="range" min="0.1" max="2" step="0.1" value="${snapSize}" id="env-snap">
          <span class="val" id="env-snap-val">${snapSize}m</span>
        </div>
      </div>
    `;
    el.innerHTML = html;

    el.querySelectorAll('.env-btn[data-time]').forEach(btn => {
      btn.addEventListener('click', () => {
        envSettings.time = btn.dataset.time;
        applyEnvironment();
        el.querySelectorAll('.env-btn[data-time]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      });
    });

    document.getElementById('env-sun')?.addEventListener('input', e => {
      dirLight.intensity = parseFloat(e.target.value);
      document.getElementById('env-sun-val').textContent = dirLight.intensity.toFixed(1);
    });
    document.getElementById('env-amb')?.addEventListener('input', e => {
      ambLight.intensity = parseFloat(e.target.value);
      document.getElementById('env-amb-val').textContent = ambLight.intensity.toFixed(2);
    });
    document.getElementById('env-exp')?.addEventListener('input', e => {
      renderer.toneMappingExposure = parseFloat(e.target.value);
      document.getElementById('env-exp-val').textContent = renderer.toneMappingExposure.toFixed(2);
    });
    document.getElementById('env-ground-color')?.addEventListener('input', e => {
      ground.material.color.set(e.target.value);
    });
    document.getElementById('env-snap')?.addEventListener('input', e => {
      snapSize = parseFloat(e.target.value);
      document.getElementById('env-snap-val').textContent = snapSize + 'm';
      document.querySelector('#snap-indicator').innerHTML = `<span class="dot" style="background:${snapEnabled?'var(--accent)':'#555'}"></span> Snap ${snapSize}m`;
      setGizmoMode(gizmoMode);
    });
  }
}

function updateInspector() {
  const body = document.getElementById('insp-body');
  if (!selectedObject) {
    body.innerHTML = `<div style="text-align:center;padding:50px 20px;color:var(--dim)">
      <div style="font-size:26px;margin-bottom:10px;opacity:.6">🛹</div>
      <div style="font-size:11px;line-height:1.6;color:var(--dim2)">Select an object or drag a component<br>to begin editing</div>
    </div>`;
    document.querySelector('#insp-header').innerHTML = '<span class="dot"></span> Inspector';
    return;
  }

  const ud = selectedObject.userData;
  const pos = selectedObject.position;
  const rot = selectedObject.rotation;
  const scl = selectedObject.scale;

  document.querySelector('#insp-header').innerHTML = `<span class="dot"></span> ${ud.icon} ${ud.name}`;

  let html = `
    <div class="insp-section">
      <div class="insp-section-title">📛 Identity</div>
      <div class="insp-row">
        <label>Name</label>
        <input type="text" value="${ud.name}" id="insp-name">
      </div>
      <div class="insp-row">
        <label>Type</label>
        <input type="text" value="${ud.type}" disabled style="opacity:0.5">
      </div>
    </div>

    <div class="insp-section">
      <div class="insp-section-title">📍 Position</div>
      <div class="insp-row">
        <div class="xyz-inputs">
          <input type="number" class="xl" step="0.1" value="${pos.x.toFixed(2)}" data-prop="px">
          <input type="number" class="yl" step="0.1" value="${pos.y.toFixed(2)}" data-prop="py">
          <input type="number" class="zl" step="0.1" value="${pos.z.toFixed(2)}" data-prop="pz">
        </div>
      </div>
    </div>

    <div class="insp-section">
      <div class="insp-section-title">🔄 Rotation (°)</div>
      <div class="insp-row">
        <div class="xyz-inputs">
          <input type="number" class="xl" step="5" value="${(rot.x * 180/Math.PI).toFixed(1)}" data-prop="rx">
          <input type="number" class="yl" step="5" value="${(rot.y * 180/Math.PI).toFixed(1)}" data-prop="ry">
          <input type="number" class="zl" step="5" value="${(rot.z * 180/Math.PI).toFixed(1)}" data-prop="rz">
        </div>
      </div>
    </div>

    <div class="insp-section">
      <div class="insp-section-title">⤢ Scale</div>
      <div class="insp-row">
        <div class="xyz-inputs">
          <input type="number" class="xl" step="0.1" value="${scl.x.toFixed(2)}" data-prop="sx">
          <input type="number" class="yl" step="0.1" value="${scl.y.toFixed(2)}" data-prop="sy">
          <input type="number" class="zl" step="0.1" value="${scl.z.toFixed(2)}" data-prop="sz">
        </div>
      </div>
    </div>

    <div class="insp-section">
      <div class="insp-section-title">⚙ Parameters</div>`;

  for (const [key, val] of Object.entries(ud.params)) {
    if (typeof val === 'number') {
      html += `<div class="insp-row">
        <label>${key}</label>
        <input type="number" step="0.1" value="${val}" data-param="${key}">
      </div>`;
    } else if (typeof val === 'boolean') {
      html += `<div class="insp-row">
        <label>${key}</label>
        <select data-param="${key}">
          <option value="true" ${val ? 'selected' : ''}>Yes</option>
          <option value="false" ${!val ? 'selected' : ''}>No</option>
        </select>
      </div>`;
    } else if (typeof val === 'string') {
      if (key === 'material') {
        html += `<div class="insp-row">
          <label>${key}</label>
          <select data-param="${key}">
            ${['concrete','concreteDark','concreteSmooth','wood','woodDark','metal'].map(m =>
              `<option value="${m}" ${val===m?'selected':''}>${m}</option>`
            ).join('')}
          </select>
        </div>`;
      } else if (key === 'style' || key === 'copingStyle') {
        html += `<div class="insp-row">
          <label>${key}</label>
          <select data-param="${key}">
            ${['round','square'].map(s =>
              `<option value="${s}" ${val===s?'selected':''}>${s}</option>`
            ).join('')}
          </select>
        </div>`;
      } else {
        html += `<div class="insp-row">
          <label>${key}</label>
          <input type="text" value="${val}" data-param="${key}">
        </div>`;
      }
    }
  }

  html += `</div>
    <div class="insp-section">
      <div class="insp-section-title">🎬 Actions</div>
      <div class="insp-actions">
        <button class="insp-btn" id="insp-dup">📋 Duplicate</button>
        <button class="insp-btn" id="insp-mirror">🔄 Mirror</button>
        <button class="insp-btn" id="insp-focus">🎯 Focus</button>
        <button class="insp-btn" id="insp-reset">↺ Reset</button>
        <button class="insp-btn danger" id="insp-del">🗑 Delete</button>
      </div>
    </div>

    <div class="insp-section">
      <div class="insp-section-title">📦 Scene Hierarchy</div>
      <div id="hierarchy"></div>
    </div>
  `;

  body.innerHTML = html;
  updateHierarchy();

  // Bind events
  document.getElementById('insp-name')?.addEventListener('change', e => {
    selectedObject.userData.name = e.target.value;
    updateHierarchy();
  });

  body.querySelectorAll('[data-prop]').forEach(input => {
    input.addEventListener('change', e => {
      if (!selectedObject) return;
      pushUndo('transform');
      const v = parseFloat(e.target.value);
      const p = e.target.dataset.prop;
      if (p === 'px') selectedObject.position.x = v;
      if (p === 'py') selectedObject.position.y = v;
      if (p === 'pz') selectedObject.position.z = v;
      if (p === 'rx') selectedObject.rotation.x = v * Math.PI/180;
      if (p === 'ry') selectedObject.rotation.y = v * Math.PI/180;
      if (p === 'rz') selectedObject.rotation.z = v * Math.PI/180;
      if (p === 'sx') selectedObject.scale.x = v;
      if (p === 'sy') selectedObject.scale.y = v;
      if (p === 'sz') selectedObject.scale.z = v;
    });
  });

  body.querySelectorAll('[data-param]').forEach(input => {
    input.addEventListener('change', e => {
      if (!selectedObject) return;
      pushUndo('param');
      const key = e.target.dataset.param;
      let val = e.target.value;
      if (e.target.type === 'number') val = parseFloat(val);
      else if (val === 'true') val = true;
      else if (val === 'false') val = false;
      selectedObject.userData.params[key] = val;
      rebuildObject(selectedObject);
    });
  });

  document.getElementById('insp-dup')?.addEventListener('click', duplicateSelected);
  document.getElementById('insp-mirror')?.addEventListener('click', mirrorSelected);
  document.getElementById('insp-focus')?.addEventListener('click', focusSelected);
  document.getElementById('insp-reset')?.addEventListener('click', resetTransform);
  document.getElementById('insp-del')?.addEventListener('click', deleteSelected);
}

function updateHierarchy() {
  const el = document.getElementById('hierarchy');
  if (!el) return;
  let html = '';
  parkObjects.forEach(obj => {
    const sel = obj === selectedObject;
    html += `<div class="hier-item ${sel ? 'selected' : ''}" data-id="${obj.userData.id}">
      <span class="hi-icon">${obj.userData.icon}</span>
      ${obj.userData.name}
    </div>`;
  });
  el.innerHTML = html;

  el.querySelectorAll('.hier-item').forEach(item => {
    item.addEventListener('click', () => {
      const id = parseInt(item.dataset.id);
      const obj = parkObjects.find(o => o.userData.id === id);
      if (obj) selectObject(obj);
    });
  });
}

function updateObjectCount() {
  document.getElementById('obj-count').textContent = parkObjects.length;
}

// ===== TOOLBAR =====
function initToolbar() {
  document.getElementById('btn-new').addEventListener('click', () => {
    if (parkObjects.length > 0 && !confirm('Clear all objects and start fresh?')) return;
    pushUndo('clear');
    while (parkObjects.length) removeObject(parkObjects[0]);
    deselectObject();
    toast('New park');
  });
  document.getElementById('btn-save').addEventListener('click', savePark);
  document.getElementById('btn-load').addEventListener('click', loadPark);
  document.getElementById('btn-export').addEventListener('click', exportPark);
  document.getElementById('btn-undo').addEventListener('click', undo);
  document.getElementById('btn-redo').addEventListener('click', redo);
  document.getElementById('btn-snap').addEventListener('click', toggleSnap);
  document.getElementById('btn-snap').classList.add('active');
  document.getElementById('btn-grid').addEventListener('click', () => {
    gridVisible = !gridVisible;
    gridHelper.visible = gridVisible;
    document.getElementById('btn-grid').classList.toggle('active', gridVisible);
  });
  document.getElementById('btn-grid').classList.add('active');
  document.getElementById('btn-flythrough').addEventListener('click', () => {
    if (flyMode) stopFlythrough();
    else startFlythrough();
  });
  document.getElementById('btn-screenshot').addEventListener('click', takeScreenshot);

  document.querySelectorAll('#gizmo-modes .gm').forEach(g => {
    g.addEventListener('click', () => setGizmoMode(g.dataset.mode));
  });
}

// ===== HELPERS =====
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._timeout);
  el._timeout = setTimeout(() => el.classList.remove('show'), 1800);
}

function showOverlay(msg) {
  const el = document.getElementById('overlay-msg');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1500);
}

// ===== MOBILE =====
function initMobile() {
  const sidebar = document.getElementById('sidebar');
  const inspector = document.getElementById('inspector');
  const backdrop = document.getElementById('mobile-backdrop');
  const toggleSidebar = document.getElementById('toggle-sidebar');
  const toggleInspector = document.getElementById('toggle-inspector');

  function isMobile() { return window.innerWidth <= 768; }

  function closePanels() {
    sidebar.classList.remove('open');
    inspector.classList.remove('open');
    backdrop.classList.remove('show');
    toggleSidebar.classList.remove('active');
    toggleInspector.classList.remove('active');
  }

  toggleSidebar.addEventListener('click', () => {
    if (!isMobile()) return;
    const opening = !sidebar.classList.contains('open');
    closePanels();
    if (opening) {
      sidebar.classList.add('open');
      backdrop.classList.add('show');
      toggleSidebar.classList.add('active');
    }
  });

  toggleInspector.addEventListener('click', () => {
    if (!isMobile()) return;
    const opening = !inspector.classList.contains('open');
    closePanels();
    if (opening) {
      inspector.classList.add('open');
      backdrop.classList.add('show');
      toggleInspector.classList.add('active');
    }
  });

  backdrop.addEventListener('click', closePanels);

  // Mobile bottom nav actions
  document.querySelectorAll('#mobile-nav .mobile-nav-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const action = btn.dataset.action;
      switch (action) {
        case 'undo': undo(); break;
        case 'redo': redo(); break;
        case 'move':
          setGizmoMode('translate');
          updateMobileNavActive('move');
          break;
        case 'rotate':
          setGizmoMode('rotate');
          updateMobileNavActive('rotate');
          break;
        case 'scale':
          setGizmoMode('scale');
          updateMobileNavActive('scale');
          break;
        case 'delete':
          deleteSelected();
          break;
      }
    });
  });

  // Close panels on resize to desktop
  window.addEventListener('resize', () => {
    if (!isMobile()) closePanels();
  });

  // Watch for selection changes to auto-open inspector on mobile
  const viewportCanvas = document.getElementById('viewport');
  viewportCanvas.addEventListener('pointerup', () => {
    setTimeout(() => {
      if (isMobile() && selectedObject) {
        closePanels();
        inspector.classList.add('open');
        backdrop.classList.add('show');
        toggleInspector.classList.add('active');
      }
    }, 50);
  });
}

function updateMobileNavActive(action) {
  document.querySelectorAll('#mobile-nav .mobile-nav-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.action === action);
  });
}

// ===== RESIZE =====
function onResize() {
  const wrap = document.getElementById('viewport-wrap');
  const w = wrap.clientWidth;
  const h = wrap.clientHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
}

// ===== ANIMATION =====
function animate() {
  requestAnimationFrame(animate);

  if (flyMode && flyData) {
    flyData.t += flyData.speed;
    if (flyData.t > 1) flyData.t -= 1;

    const pos = flyData.curve.getPointAt(flyData.t);
    const lookAt = flyData.curve.getPointAt((flyData.t + 0.01) % 1);
    camera.position.copy(pos);
    camera.lookAt(lookAt);
  } else {
    orbitControls.update();
  }

  renderer.render(scene, camera);
}

// ===== START =====
init();
</script>
